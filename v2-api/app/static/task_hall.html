<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>&#20219;&#21153;&#23457;&#38405;&#24037;&#20316;&#21488;</title>
    <style>
      :root {
        --bg: #f3f5f7;
        --surface: #ffffff;
        --surface-2: #f8fafb;
        --surface-3: #eef2f5;
        --ink: #111827;
        --muted: #687386;
        --subtle: #95a0ae;
        --line: #d8dee6;
        --line-strong: #bdc7d2;
        --accent: #0f6f8f;
        --accent-ink: #06384a;
        --accent-soft: #e4f2f6;
        --ok: #12664f;
        --warn: #956012;
        --bad: #a32920;
        --radius: 10px;
        --shadow: 0 18px 45px rgba(22, 34, 48, .08);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, #f8fafc 0, var(--bg) 220px),
          var(--bg);
      }
      button, input, select, textarea { font: inherit; }
      button, .button {
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 0 12px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }
      button.secondary, .button.secondary { background: #fff; color: var(--accent-ink); border-color: var(--line-strong); }
      button.ghost { background: transparent; color: var(--muted); border-color: transparent; }
      button:disabled { opacity: .52; cursor: not-allowed; }
      input, select, textarea {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
      }
      input, select { height: 34px; padding: 0 10px; }
      textarea { width: 100%; min-height: 220px; padding: 12px; resize: vertical; font: 13px/1.55 Consolas, "Courier New", monospace; }
      h1, h2, h3, p { margin: 0; }
      .app {
        height: 100vh;
        display: grid;
        grid-template-rows: 58px minmax(0, 1fr);
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, .88);
        backdrop-filter: blur(12px);
      }
      .brand { display: flex; align-items: center; gap: 12px; }
      .mark {
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        border-radius: 9px;
        background: #17212b;
        color: #d9f5ff;
        font-size: 13px;
        font-weight: 900;
      }
      h1 { font-size: 17px; letter-spacing: 0; }
      .top-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
      .actions { display: flex; align-items: center; gap: 8px; }
      .reviewer { width: 150px; }
      .workspace {
        min-height: 0;
        display: grid;
        grid-template-columns: 330px 420px minmax(520px, 1fr);
        gap: 12px;
        padding: 12px;
      }
      .panel {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .panel-head {
        min-height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--surface-2);
      }
      .panel-title { font-size: 14px; font-weight: 900; }
      .panel-subtitle { color: var(--muted); font-size: 12px; }
      .panel-body { min-height: 0; overflow: auto; padding: 10px; }
      .filters {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 10px;
        border-bottom: 1px solid var(--line);
      }
      .filters .span { grid-column: 1 / -1; }
      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        border-radius: 7px;
        padding: 2px 7px;
        background: var(--surface-3);
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }
      .badge.ok { color: var(--ok); background: #e8f5ef; }
      .badge.warn { color: var(--warn); background: #fff4d8; }
      .badge.bad { color: var(--bad); background: #fff0ee; }
      .task, .group, .photo-card {
        border: 1px solid var(--line);
        border-radius: 9px;
        background: #fff;
      }
      .task, .group {
        padding: 10px;
        margin-bottom: 8px;
        cursor: pointer;
      }
      .task:hover, .group:hover, .photo-card:hover { border-color: var(--line-strong); }
      .task.active, .group.active {
        border-color: var(--accent);
        box-shadow: inset 3px 0 0 var(--accent);
        background: linear-gradient(90deg, var(--accent-soft), #fff 45%);
      }
      .name-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .name { font-weight: 900; }
      .small { color: var(--muted); font-size: 12px; line-height: 1.55; }
      .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 9px; }
      .metric { padding: 8px; border-radius: 8px; background: var(--surface-2); }
      .metric span { display: block; color: var(--muted); font-size: 11px; }
      .metric strong { display: block; margin-top: 2px; font-size: 18px; }
      .progress { height: 6px; margin-top: 9px; border-radius: 99px; background: #e8edf2; overflow: hidden; }
      .progress i { display: block; width: var(--value); height: 100%; background: var(--accent); }
      .empty {
        min-height: 150px;
        display: grid;
        place-items: center;
        color: var(--muted);
        text-align: center;
        padding: 20px;
      }
      .review-shell {
        height: 100%;
        min-height: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
      }
      .review-main {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 250px;
        gap: 10px;
      }
      .viewer {
        min-height: 0;
        display: grid;
        place-items: center;
        border: 1px solid #111827;
        border-radius: 10px;
        background: #0c1117;
        overflow: hidden;
      }
      .viewer img {
        max-width: 100%;
        max-height: calc(100vh - 190px);
        object-fit: contain;
      }
      .placeholder {
        width: min(92%, 560px);
        aspect-ratio: 4 / 3;
        display: grid;
        place-items: center;
        border: 1px dashed #6f8192;
        border-radius: 10px;
        color: #dce9f2;
        text-align: center;
        padding: 18px;
      }
      .photo-list { min-height: 0; overflow: auto; display: grid; gap: 8px; align-content: start; }
      .photo-card { padding: 9px; cursor: pointer; }
      .photo-card.active { border-color: var(--accent); background: var(--accent-soft); }
      .review-tools {
        margin-top: 10px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface-2);
      }
      .category-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }
      .category-key {
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: #fff;
        color: var(--ink);
        padding: 7px;
        justify-content: flex-start;
        text-align: left;
      }
      .category-key.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-ink); }
      .keycap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        margin-right: 6px;
        border-radius: 6px;
        background: #17212b;
        color: #fff;
        font-size: 12px;
      }
      .tool-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 10px; }
      .kbd-note { color: var(--muted); font-size: 12px; }
      .drawer {
        position: fixed;
        inset: 0;
        display: none;
        background: rgba(17, 24, 39, .34);
        z-index: 10;
      }
      .drawer.show { display: grid; justify-items: end; }
      .drawer-panel {
        width: min(720px, 96vw);
        height: 100%;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        background: #fff;
        box-shadow: -22px 0 50px rgba(17, 24, 39, .18);
      }
      .drawer-head, .drawer-foot { padding: 14px; border-bottom: 1px solid var(--line); }
      .drawer-foot { border-top: 1px solid var(--line); border-bottom: 0; display: flex; justify-content: flex-end; gap: 8px; }
      .drawer-body { overflow: auto; padding: 14px; display: grid; gap: 12px; }
      .file-import {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface-2);
      }
      .file-import input {
        width: 100%;
        height: auto;
        padding: 9px;
      }
      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        padding: 12px 14px;
        border-radius: 9px;
        background: #17212b;
        color: #fff;
        opacity: 0;
        transform: translateY(8px);
        transition: .16s ease;
        z-index: 20;
      }
      .toast.show { opacity: 1; transform: translateY(0); }
      @media (max-width: 1180px) {
        .app { height: auto; min-height: 100vh; }
        .topbar { align-items: flex-start; flex-direction: column; height: auto; padding: 12px; gap: 10px; }
        .actions { width: 100%; flex-wrap: wrap; }
        .workspace { grid-template-columns: 320px minmax(0, 1fr); }
        .workspace .panel:last-child { grid-column: 1 / -1; min-height: 620px; }
      }
      @media (max-width: 760px) {
        .workspace { grid-template-columns: 1fr; }
        .workspace .panel:last-child { grid-column: auto; }
        .review-main { grid-template-columns: 1fr; }
        .photo-list { grid-template-columns: repeat(2, minmax(0, 1fr)); max-height: 210px; }
        .category-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="mark">V2</div>
          <div>
            <h1>&#20219;&#21153;&#23457;&#38405;&#24037;&#20316;&#21488;</h1>
            <p class="top-meta">&#34920;&#26684;&#23548;&#20837; / URL &#22270;&#29255; / &#24555;&#25463;&#38190;&#20998;&#31867;</p>
          </div>
        </div>
        <div class="actions">
          <input class="reviewer" id="reviewer" value="local-reviewer" aria-label="reviewer" />
          <button class="secondary" id="openImport">&#23548;&#20837;&#34920;&#26684;&#25968;&#25454;</button>
          <button class="secondary" id="clearScan">&#28165;&#31354;&#23548;&#20837;&#25968;&#25454;</button>
          <button id="reload">&#21047;&#26032;</button>
        </div>
      </header>
      <main class="workspace">
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">&#20219;&#21153;</h2>
              <p class="panel-subtitle">&#20165;&#26174;&#31034;&#24050;&#23548;&#20837;&#29031;&#29255; URL &#30340;&#20219;&#21153;</p>
            </div>
            <span class="badge" id="taskCount">0</span>
          </div>
          <div class="filters">
            <select id="claimFilter">
              <option value="">&#20840;&#37096;&#39046;&#21462;&#29366;&#24577;</option>
              <option value="available">&#21487;&#39046;&#21462;</option>
              <option value="mine">&#25105;&#39046;&#21462;&#30340;</option>
              <option value="claimed">&#24050;&#34987;&#39046;&#21462;</option>
            </select>
            <select id="completeFilter">
              <option value="">&#20840;&#37096;&#23436;&#25972;&#24230;</option>
              <option value="complete">&#24050;&#23436;&#25972;</option>
              <option value="partial">&#37096;&#20998;&#23436;&#25972;</option>
              <option value="empty">&#26080;&#29031;&#29255;</option>
            </select>
          </div>
          <div class="panel-body" id="tasks"></div>
        </section>
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">&#36164;&#26009;&#32452;</h2>
              <p class="panel-subtitle">&#25353;&#32456;&#31471;&#20219;&#21153;&#31579;&#36873;</p>
            </div>
            <span class="badge" id="groupCount">0</span>
          </div>
          <div class="panel-body" id="groups"></div>
        </section>
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">&#22270;&#29255;&#23457;&#38405;</h2>
              <p class="panel-subtitle">1-5 &#36873;&#20998;&#31867;&#65292;Enter &#24402;&#26723;&#65292;&#26041;&#21521;&#38190;&#20999;&#25442;</p>
            </div>
            <span class="badge" id="photoState">&#26410;&#36873;&#25321;</span>
          </div>
          <div class="panel-body" id="review"></div>
        </section>
      </main>
    </div>
    <div class="drawer" id="importDrawer">
      <div class="drawer-panel">
        <div class="drawer-head">
          <h2 class="panel-title">&#23548;&#20837;&#34920;&#26684;&#25968;&#25454;</h2>
          <p class="panel-subtitle">&#21487;&#19978;&#20256; CSV&#65292;&#20063;&#21487;&#31896;&#36148; JSON &#34892;&#25968;&#32452;&#65307;Excel &#27169;&#26495;&#21040;&#20301;&#21518;&#25509;&#20837;&#30452;&#25509;&#19978;&#20256;</p>
        </div>
        <div class="drawer-body">
          <div class="file-import">
            <strong>&#20174; CSV &#34920;&#26684;&#35835;&#21462;</strong>
            <input id="csvFile" type="file" accept=".csv,text/csv" />
            <p class="small">&#36873;&#25321; CSV &#21518;&#20250;&#33258;&#21160;&#36716;&#25104;&#19979;&#26041; JSON &#39044;&#35272;&#65292;&#30830;&#35748;&#21518;&#20877;&#28857;&#20987;&#23548;&#20837;&#12290;</p>
          </div>
          <textarea id="importPayload" spellcheck="false" placeholder='[{"meter_no":"120000784940","terminal":"350000434929","collector":"A","module_asset_no":"M-001","address":"...","photo_urls":"https://example/1.jpg,https://example/2.jpg"}]'></textarea>
          <p class="small">&#21487;&#35782;&#21035;&#23383;&#27573;&#65306;&#32456;&#31471;&#12289;&#37319;&#38598;&#22120;&#12289;&#34920;&#21495;&#12289;&#27169;&#22359;&#12289;&#22320;&#22336;&#12289;&#29031;&#29255;URL&#12290;&#29031;&#29255; URL &#21482;&#20445;&#23384;&#38142;&#25509;&#65292;&#19981;&#19979;&#36733;&#26412;&#22320;&#12290;</p>
        </div>
        <div class="drawer-foot">
          <button class="secondary" id="closeImport">&#21462;&#28040;</button>
          <button id="submitImport">&#23548;&#20837;&#24182;&#21047;&#26032;</button>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
      const state = { tasks: [], groups: [], group: null, photo: null, reviewer: "local-reviewer", taskId: null };
      const categories = {
        before_box: "\u8868\u7bb1\u6574\u4f53\u6539\u9020\u524d",
        after_box: "\u8868\u7bb1\u6574\u4f53\u6539\u9020\u540e",
        module_meter: "\u6a21\u5757\u4e0e\u7535\u80fd\u8868",
        collector_barcode: "\u91c7\u96c6\u5668\u6761\u5f62\u7801",
        other: "\u5176\u4ed6",
      };
      const categoryKeys = Object.keys(categories);
      const $ = (selector) => document.querySelector(selector);
      const esc = (value) => String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
      async function api(path, options = {}) {
        const response = await fetch(path, { headers: { "Content-Type": "application/json" }, ...options });
        const payload = await response.json();
        if (!response.ok || payload.error) throw new Error(payload.detail || payload.error?.message || response.statusText);
        return payload.data;
      }
      function toast(message, bad = false) {
        $("#toast").textContent = message;
        $("#toast").style.background = bad ? "#a32920" : "#17212b";
        $("#toast").classList.add("show");
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => $("#toast").classList.remove("show"), 2400);
      }
      function pct(value) { return `${Math.round((Number(value) || 0) * 100)}%`; }
      function activePhotoIndex() { return (state.group?.photos || []).findIndex((photo) => photo.id === state.photo?.id); }
      function activeGroupIndex() { return state.groups.findIndex((group) => group.id === state.group?.id); }
      function filteredTasks() {
        const claim = $("#claimFilter").value;
        const complete = $("#completeFilter").value;
        return state.tasks.filter((task) => {
          const c = Number(task.completeness_rate) || 0;
          return task.has_scan_info
            && (!claim || (claim === "available" ? task.can_claim && !task.claimed_by : claim === "mine" ? task.claimed_by === state.reviewer : Boolean(task.claimed_by)))
            && (!complete || (complete === "complete" ? c >= 1 : complete === "partial" ? c > 0 && c < 1 : c === 0));
        });
      }
      function renderTasks() {
        const tasks = filteredTasks();
        $("#taskCount").textContent = `${tasks.length}/${state.tasks.length}`;
        $("#tasks").innerHTML = tasks.length ? tasks.map((task) => `
          <article class="task ${state.taskId === task.id ? "active" : ""}">
            <div class="name-row"><strong class="name">${esc(task.name)}</strong><span class="badge ${task.can_claim ? "ok" : "warn"}">${task.can_claim ? "\u53ef\u9886\u53d6" : "\u672a\u5c31\u7eea"}</span></div>
            <div class="small">\u7ec8\u7aef ${esc(task.terminal || "-")} / ${task.claimed_by ? `\u5df2\u7531 ${esc(task.claimed_by)} \u9886\u53d6` : "\u672a\u9886\u53d6"}</div>
            <div class="metric-grid">
              <div class="metric"><span>\u6709\u56fe\u8d44\u6599\u7ec4</span><strong>${task.groups_with_scan || 0}</strong></div>
              <div class="metric"><span>\u5b8c\u6574\u7387</span><strong>${pct(task.completeness_rate)}</strong></div>
            </div>
            <div class="progress"><i style="--value:${pct(task.completeness_rate)}"></i></div>
            <div class="tool-row">
              <button class="secondary" data-action="view" data-id="${task.id}">\u67e5\u770b</button>
              <button data-action="claim" data-id="${task.id}" ${task.can_claim ? "" : "disabled"}>\u9886\u53d6</button>
            </div>
          </article>
        `).join("") : `<div class="empty">\u6682\u65e0\u5df2\u5bfc\u5165 URL \u7167\u7247\u7684\u4efb\u52a1</div>`;
        $("#tasks").querySelectorAll("button[data-action]").forEach((button) => button.addEventListener("click", () => handleTask(button.dataset.id, button.dataset.action)));
      }
      function renderGroups() {
        $("#groupCount").textContent = `${state.groups.length}`;
        $("#groups").innerHTML = state.groups.length ? state.groups.map((group) => `
          <article class="group ${state.group?.id === group.id ? "active" : ""}" data-group="${group.id}">
            <div class="name-row"><strong class="name">${esc(group.meter_no)}</strong><span class="badge ${group.photo_count >= 4 ? "ok" : "warn"}">${group.photo_count || 0} \u5f20</span></div>
            <div class="small">${esc(group.terminal)} / ${esc(group.address || "\u672a\u5339\u914d\u5730\u5740")}</div>
          </article>
        `).join("") : `<div class="empty">\u9009\u62e9\u4e00\u4e2a\u6709\u6570\u636e\u7684\u4efb\u52a1</div>`;
        $("#groups").querySelectorAll("[data-group]").forEach((row) => row.addEventListener("click", () => loadGroup(row.dataset.group)));
      }
      function renderReview() {
        if (!state.group) {
          $("#review").innerHTML = `<div class="empty">\u9009\u62e9\u8d44\u6599\u7ec4\u540e\u5f00\u59cb\u5ba1\u9605</div>`;
          $("#photoState").textContent = "\u672a\u9009\u62e9";
          return;
        }
        const photos = state.group.photos || [];
        if (!photos.length) {
          $("#review").innerHTML = `<div class="empty">\u8be5\u8d44\u6599\u7ec4\u6ca1\u6709\u56fe\u7247 URL</div>`;
          $("#photoState").textContent = "\u65e0\u56fe\u7247";
          return;
        }
        if (!state.photo || !photos.some((photo) => photo.id === state.photo.id)) state.photo = photos[0];
        $("#photoState").textContent = `${activePhotoIndex() + 1}/${photos.length} ${state.photo.archive_status === "archived" ? "\u5df2\u5f52\u6863" : "\u5f85\u5f52\u6863"}`;
        const url = state.photo.image_url || "";
        $("#review").innerHTML = `
          <div class="review-shell">
            <div class="review-main">
              <div class="viewer">${url ? `<img src="${esc(url)}" alt="\u5ba1\u9605\u56fe\u7247" />` : `<div class="placeholder">\u56fe\u7247 URL \u672a\u52a0\u8f7d<br />${esc(state.photo.barcode || "")}</div>`}</div>
              <div class="photo-list">${photos.map((photo, index) => `
                <article class="photo-card ${state.photo.id === photo.id ? "active" : ""}" data-photo="${photo.id}">
                  <div class="name-row"><strong>#${index + 1}</strong><span class="badge ${photo.archive_status === "archived" ? "ok" : "warn"}">${photo.archive_status === "archived" ? "\u5df2\u5f52\u6863" : "\u5f85\u5206\u7c7b"}</span></div>
                  <div class="small">${esc(photo.category_label || "\u672a\u5206\u7c7b")}</div>
                  <div class="small">${esc(photo.archive_filename || "")}</div>
                </article>
              `).join("")}</div>
            </div>
            <div class="review-tools">
              <div class="category-grid">${categoryKeys.map((key, index) => `
                <button class="category-key ${state.photo.category === key ? "active" : ""}" data-category="${key}">
                  <span class="keycap">${index + 1}</span>${categories[key]}
                </button>
              `).join("")}</div>
              <div class="tool-row">
                <span class="kbd-note">&#8592;/&#8594; &#20999;&#22270;&#65292;&#8593;/&#8595; &#20999;&#36164;&#26009;&#32452;&#65292;Enter &#24402;&#26723;</span>
                <button id="archivePhoto">Enter &#24402;&#26723;&#24403;&#21069;&#22270;</button>
              </div>
            </div>
          </div>`;
        $("#review").querySelectorAll("[data-photo]").forEach((item) => item.addEventListener("click", () => {
          state.photo = photos.find((photo) => photo.id === item.dataset.photo);
          renderReview();
        }));
        $("#review").querySelectorAll("[data-category]").forEach((button) => button.addEventListener("click", () => {
          state.photo.category = button.dataset.category;
          renderReview();
        }));
        $("#archivePhoto").addEventListener("click", archivePhoto);
      }
      async function handleTask(id, action) {
        if (action === "claim") await api(`/local-test/tasks/${id}/claim`, { method: "POST", body: JSON.stringify({ reviewer: state.reviewer }) });
        state.taskId = Number(id);
        const data = await api(`/local-test/tasks/${id}/groups?limit=1000&scan_only=true`);
        state.groups = data.items || [];
        state.group = null;
        state.photo = null;
        await refreshTasks();
        renderGroups();
        renderReview();
      }
      async function loadGroup(id, preferredPhotoId = null) {
        $("#photoState").textContent = "\u52a0\u8f7d URL";
        state.group = await api(`/local-test/groups/${encodeURIComponent(id)}`);
        const photos = state.group.photos || [];
        state.photo = photos.find((photo) => photo.id === preferredPhotoId) || photos[0] || null;
        renderGroups();
        renderReview();
      }
      async function archivePhoto() {
        if (!state.group || !state.photo) return;
        const category = state.photo.category && state.photo.category !== "unclassified" ? state.photo.category : categoryKeys[0];
        const photos = state.group.photos || [];
        const currentIndex = activePhotoIndex();
        const nextPhoto = photos[currentIndex + 1] || photos[currentIndex - 1] || state.photo;
        await api(`/local-test/groups/${encodeURIComponent(state.group.id)}/photos/${encodeURIComponent(state.photo.id)}/category`, {
          method: "PATCH",
          body: JSON.stringify({ category, reviewer: state.reviewer }),
        });
        await loadGroup(state.group.id, nextPhoto?.id);
        toast("\u5f53\u524d\u56fe\u7247\u5df2\u5f52\u6863");
      }
      async function refreshTasks() {
        state.tasks = (await api("/local-test/tasks")).items || [];
        renderTasks();
      }
      async function reloadAll() {
        await refreshTasks();
        if (!state.taskId) {
          const visibleTasks = filteredTasks();
          const first = visibleTasks.find((task) => task.can_claim) || visibleTasks[0];
          if (first) await handleTask(first.id, "view");
        }
      }
      async function submitImport() {
        let rows;
        try {
          rows = JSON.parse($("#importPayload").value);
        } catch (error) {
          throw new Error("\u8bf7\u7c98\u8d34 JSON \u6570\u7ec4");
        }
        if (!Array.isArray(rows)) throw new Error("\u683c\u5f0f\u5fc5\u987b\u662f JSON \u6570\u7ec4");
        const result = await api("/local-test/scan/import-url-rows", {
          method: "POST",
          body: JSON.stringify({ rows }),
        });
        $("#importDrawer").classList.remove("show");
        state.taskId = null;
        state.groups = [];
        state.group = null;
        state.photo = null;
        await reloadAll();
        toast(`\u5df2\u5339\u914d ${result.applied_records || 0} \u5f20\u56fe`);
      }
      function parseCsv(text) {
        const rows = [];
        let row = [];
        let cell = "";
        let quoted = false;
        for (let index = 0; index < text.length; index += 1) {
          const char = text[index];
          const next = text[index + 1];
          if (char === '"' && quoted && next === '"') {
            cell += '"';
            index += 1;
          } else if (char === '"') {
            quoted = !quoted;
          } else if (char === "," && !quoted) {
            row.push(cell.trim());
            cell = "";
          } else if ((char === "\n" || char === "\r") && !quoted) {
            if (char === "\r" && next === "\n") index += 1;
            row.push(cell.trim());
            if (row.some(Boolean)) rows.push(row);
            row = [];
            cell = "";
          } else {
            cell += char;
          }
        }
        row.push(cell.trim());
        if (row.some(Boolean)) rows.push(row);
        const headers = rows.shift() || [];
        return rows.map((values) => Object.fromEntries(headers.map((header, index) => [header, values[index] || ""])));
      }
      async function loadCsvFile(file) {
        const text = await file.text();
        const rows = parseCsv(text);
        $("#importPayload").value = JSON.stringify(rows, null, 2);
        toast(`CSV \u5df2\u8bfb\u53d6 ${rows.length} \u884c`);
      }
      function movePhoto(delta) {
        const photos = state.group?.photos || [];
        if (!photos.length) return;
        const next = Math.max(0, Math.min(photos.length - 1, activePhotoIndex() + delta));
        state.photo = photos[next];
        renderReview();
      }
      function moveGroup(delta) {
        if (!state.groups.length) return;
        const current = activeGroupIndex();
        const next = Math.max(0, Math.min(state.groups.length - 1, (current < 0 ? 0 : current) + delta));
        loadGroup(state.groups[next].id);
      }
      $("#reviewer").addEventListener("input", (event) => { state.reviewer = event.target.value.trim() || "local-reviewer"; });
      ["claimFilter", "completeFilter"].forEach((id) => $("#" + id).addEventListener("change", renderTasks));
      $("#reload").addEventListener("click", reloadAll);
      $("#openImport").addEventListener("click", () => $("#importDrawer").classList.add("show"));
      $("#closeImport").addEventListener("click", () => $("#importDrawer").classList.remove("show"));
      $("#submitImport").addEventListener("click", () => submitImport().catch((error) => toast(error.message, true)));
      $("#csvFile").addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (file) loadCsvFile(file).catch((error) => toast(error.message, true));
      });
      $("#clearScan").addEventListener("click", async () => {
        await api("/local-test/scan/clear", { method: "POST" });
        state.taskId = null;
        state.groups = [];
        state.group = null;
        state.photo = null;
        await refreshTasks();
        renderGroups();
        renderReview();
        toast("\u5df2\u6e05\u7a7a\u5bfc\u5165\u6570\u636e");
      });
      document.addEventListener("keydown", (event) => {
        if (event.target.matches("input, textarea, select")) return;
        if (/^[1-5]$/.test(event.key) && state.photo) {
          state.photo.category = categoryKeys[Number(event.key) - 1];
          renderReview();
          event.preventDefault();
        } else if (event.key === "Enter") {
          archivePhoto().catch((error) => toast(error.message, true));
          event.preventDefault();
        } else if (event.key === "ArrowRight") {
          movePhoto(1);
          event.preventDefault();
        } else if (event.key === "ArrowLeft") {
          movePhoto(-1);
          event.preventDefault();
        } else if (event.key === "ArrowDown") {
          moveGroup(1);
          event.preventDefault();
        } else if (event.key === "ArrowUp") {
          moveGroup(-1);
          event.preventDefault();
        }
      });
      reloadAll().catch((error) => toast(error.message, true));
    </script>
  </body>
</html>
