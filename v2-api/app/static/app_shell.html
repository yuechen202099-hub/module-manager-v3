<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>模块更换项目管理器</title>
    <style>
      :root {
        --topbar: #111820;
        --topbar-2: #182330;
        --accent: #0f6f8f;
        --accent-ink: #06384a;
        --line: rgba(255,255,255,.12);
        --topbar-height: 64px;
        --page-nav-width: 450px;
      }
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; }
      body {
        display: grid;
        grid-template-rows: var(--topbar-height) minmax(0, 1fr);
        overflow: hidden;
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
        color: #f7fbff;
        background: #eef2f5;
      }
      button, .button {
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 10px;
        background: rgba(255,255,255,.08);
        color: #edf7fb;
        font-weight: 900;
        text-decoration: none;
        cursor: pointer;
        white-space: nowrap;
      }
      button:hover, .button:hover { background: rgba(255,255,255,.14); }
      .topbar {
        height: var(--topbar-height);
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        padding: 0 20px;
        border-bottom: 1px solid rgba(255,255,255,.08);
        background: linear-gradient(180deg, var(--topbar), var(--topbar-2));
        box-shadow: 0 14px 34px rgba(17,24,32,.16);
        overflow: hidden;
      }
      .brand {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .mark {
        min-width: 38px;
        padding: 0 6px;
        height: 28px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: rgba(255,255,255,.08);
        color: #d9f5ff;
        font-size: 13px;
        font-weight: 900;
      }
      h1, p { margin: 0; }
      h1 {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 17px;
        line-height: 20px;
      }
      .brand p {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #8fa0ad;
        font-size: 12px;
        line-height: 16px;
      }
      .actions {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .actions::-webkit-scrollbar { display: none; }
      .page-nav {
        width: min(var(--page-nav-width), 100%);
        height: 38px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px;
        border: 1px solid rgba(255,255,255,.11);
        border-radius: 10px;
        background: rgba(255,255,255,.05);
        flex: 0 0 auto;
      }
      .page-nav .button {
        min-width: 0;
        height: 30px;
        flex: 1 1 0;
        padding: 0 8px;
        border-color: transparent;
        background: transparent;
        color: #b9c8d3;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .page-nav .button.active {
        background: #eaf7fb;
        color: var(--accent-ink);
        box-shadow: 0 8px 18px rgba(0,0,0,.16);
      }
      .user-pill {
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 10px;
        color: #d7e3ec;
        background: rgba(255,255,255,.07);
        font-size: 12px;
        font-weight: 900;
        white-space: nowrap;
      }
      .export-status {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 50;
        width: min(420px, calc(100vw - 32px));
        display: none;
        gap: 8px;
        padding: 12px;
        border: 1px solid rgba(15,111,143,.28);
        border-radius: 12px;
        color: #102033;
        background: rgba(255,255,255,.96);
        box-shadow: 0 18px 45px rgba(16,31,45,.16);
      }
      .export-status.show { display: grid; }
      .export-status strong { font-size: 14px; }
      .export-status span { color: #667280; font-size: 12px; }
      .export-bar {
        height: 8px;
        overflow: hidden;
        border-radius: 99px;
        background: #e3eaf0;
      }
      .export-bar i {
        display: block;
        width: var(--value, 0%);
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
      }
      .frame-wrap {
        min-height: 0;
        height: calc(100vh - var(--topbar-height));
        overflow: hidden;
      }
      iframe {
        width: 100%;
        height: 100%;
        min-height: 0;
        display: block;
        border: 0;
        background: #eef2f5;
      }
      @media (max-width: 900px) {
        .topbar { grid-template-columns: 1fr; height: auto; min-height: var(--topbar-height); padding: 8px 12px; }
        .brand p, .user-pill { display: none; }
        .actions { justify-content: flex-start; }
      }
      @media (max-width: 760px) {
        body[data-current-page="construction"] {
          grid-template-rows: minmax(0, 1fr);
        }
        body[data-current-page="construction"] .topbar {
          display: none;
        }
        body[data-current-page="construction"] .frame-wrap {
          height: 100dvh;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="mark">V2.5.6</div>
        <div>
          <h1 id="pageTitle">项目看板</h1>
          <p>V2.5.6 生产环境，异常处理已并入审阅工作台</p>
        </div>
      </div>
      <div class="actions">
        <nav class="page-nav" aria-label="页面切换">
          <button class="button active" type="button" data-page="project-board">项目看板</button>
          <button class="button" type="button" data-page="claim-tasks">任务领取</button>
          <button class="button" type="button" data-page="task-hall">审阅工作台</button>
          <button class="button" type="button" data-page="construction">施工采集</button>
        </nav>
        <span class="user-pill" id="sessionUser">未登录</span>
        <button id="logout" type="button">退出</button>
      </div>
    </header>
    <main class="frame-wrap">
      <iframe id="workFrame" title="工作区"></iframe>
    </main>
    <aside class="export-status" id="exportStatus" aria-live="polite">
      <strong id="exportTitle">导出任务</strong>
      <span id="exportDetail">等待开始</span>
      <div class="export-bar"><i id="exportProgress"></i></div>
    </aside>
    <script>
      const session = JSON.parse(localStorage.getItem("module_manager_session") || "null");
      if (!session?.access_token) location.href = "/login";
      const embeddedVersion = "20260618-v23-final";
      const embeddedSrc = (path, params = {}) => {
        const search = new URLSearchParams({ embedded: "1", v: embeddedVersion, ...params });
        return `${path}?${search.toString()}`;
      };
      const roles = session?.user?.roles || [];
      const pageMeta = {
        "project-board": { title: "项目看板", src: embeddedSrc("/project-board") },
        "claim-tasks": { title: "任务领取", src: embeddedSrc("/claim-tasks") },
        "task-hall": { title: "审阅工作台", src: embeddedSrc("/task-hall") },
        construction: { title: "施工采集", src: embeddedSrc("/construction") },
      };
      const pageRoles = {
        "project-board": ["admin", "reviewer"],
        "claim-tasks": ["admin", "reviewer"],
        "task-hall": ["admin", "reviewer"],
        construction: ["admin", "constructor"],
      };
      function canOpenPage(page) {
        const allowedRoles = pageRoles[page] || [];
        return allowedRoles.some((role) => roles.includes(role));
      }
      const defaultPage = roles.includes("constructor") && !roles.includes("admin") && !roles.includes("reviewer")
        ? "construction"
        : roles.includes("admin")
        ? "project-board"
        : "task-hall";
      const params = new URLSearchParams(location.search);
      const requestedPage = params.get("page");
      const initialPage = pageMeta[requestedPage] && canOpenPage(requestedPage) ? requestedPage : defaultPage;
      const frame = document.querySelector("#workFrame");
      const pageTitle = document.querySelector("#pageTitle");
      document.querySelector("#sessionUser").textContent = session?.user?.name || session?.user?.username || "用户";
      document.querySelector("#logout").addEventListener("click", () => {
        localStorage.removeItem("module_manager_session");
        localStorage.removeItem("module_manager_reviewer");
        location.href = "/login";
      });
      const teamId = session?.team_id || session?.user?.team_id || localStorage.getItem("module_manager_team_id") || "default-team";
      localStorage.setItem("module_manager_team_id", teamId);
      const exportStatus = document.querySelector("#exportStatus");
      const exportTitle = document.querySelector("#exportTitle");
      const exportDetail = document.querySelector("#exportDetail");
      const exportProgress = document.querySelector("#exportProgress");
      let shellExportActive = false;
      let shellImportActive = false;
      let refreshVersion = Number(localStorage.getItem("module_manager_refresh_version") || 0);
      const authHeaders = () => session?.access_token ? { Authorization: `${session.token_type || "bearer"} ${session.access_token}` } : {};
      const teamHeaders = (extra = {}) => ({ "X-Team-Id": teamId, ...authHeaders(), ...extra });
      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      async function shellApi(path) {
        const response = await fetch(path, { headers: teamHeaders() });
        const payload = await response.json();
        if (!response.ok || payload.error) throw new Error(payload.detail || payload.error?.message || response.statusText);
        return payload.data;
      }
      function setExportStatus(title, detail, rate = 0, done = false) {
        exportTitle.textContent = title;
        exportDetail.textContent = detail;
        exportProgress.style.setProperty("--value", `${Math.max(0, Math.min(100, Math.round(rate * 100)))}%`);
        exportStatus.classList.add("show");
        if (done) setTimeout(() => exportStatus.classList.remove("show"), 4200);
      }
      function postRefreshToFrame(reason, payload = {}, version = refreshVersion) {
        try {
          frame.contentWindow?.postMessage({ type: "module-manager:data-refresh", reason, payload, version }, location.origin);
        } catch {
          // The iframe may be between navigations; the next page load fetches fresh data anyway.
        }
      }
      function broadcastDataRefresh(reason, payload = {}) {
        refreshVersion += 1;
        localStorage.setItem("module_manager_refresh_version", String(refreshVersion));
        localStorage.setItem("module_manager_refresh_event", JSON.stringify({
          teamId,
          reason,
          payload,
          version: refreshVersion,
          ts: Date.now(),
        }));
        postRefreshToFrame(reason, payload, refreshVersion);
      }
      window.addEventListener("storage", (event) => {
        if (event.key !== "module_manager_refresh_event" || !event.newValue) return;
        try {
          const refresh = JSON.parse(event.newValue);
          if (refresh.teamId !== teamId) return;
          refreshVersion = Math.max(refreshVersion, Number(refresh.version || 0));
          postRefreshToFrame(refresh.reason || "external-refresh", refresh.payload || {}, refreshVersion);
        } catch {
          // Ignore malformed cross-tab refresh events.
        }
      });
      const zipEncoder = new TextEncoder();
      const crcTable = (() => {
        const table = new Uint32Array(256);
        for (let i = 0; i < 256; i += 1) {
          let value = i;
          for (let bit = 0; bit < 8; bit += 1) value = value & 1 ? 0xedb88320 ^ (value >>> 1) : value >>> 1;
          table[i] = value >>> 0;
        }
        return table;
      })();
      function bytesLE(value, length) {
        const bytes = new Uint8Array(length);
        let remaining = value >>> 0;
        for (let index = 0; index < length; index += 1) {
          bytes[index] = remaining & 0xff;
          remaining = Math.floor(remaining / 256);
        }
        return bytes;
      }
      function concatBytes(parts) {
        const total = parts.reduce((sum, part) => sum + part.length, 0);
        const merged = new Uint8Array(total);
        let offset = 0;
        for (const part of parts) {
          merged.set(part, offset);
          offset += part.length;
        }
        return merged;
      }
      function crc32(bytes) {
        let crc = 0xffffffff;
        for (const byte of bytes) crc = crcTable[(crc ^ byte) & 0xff] ^ (crc >>> 8);
        return (crc ^ 0xffffffff) >>> 0;
      }
      function dosTimestamp(date = new Date()) {
        const time = (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2);
        const dosDate = ((Math.max(1980, date.getFullYear()) - 1980) << 9) | ((date.getMonth() + 1) << 5) | Math.max(1, date.getDate());
        return { time, date: dosDate };
      }
      async function entryBytes(data) {
        if (data instanceof Uint8Array) return data;
        if (data instanceof Blob) return new Uint8Array(await data.arrayBuffer());
        return zipEncoder.encode(String(data ?? ""));
      }
      async function createZipBlob(entries) {
        const localParts = [];
        const centralParts = [];
        const stamp = dosTimestamp();
        let offset = 0;
        for (const entry of entries) {
          const nameBytes = zipEncoder.encode(entry.name.replaceAll("\\", "/"));
          const data = await entryBytes(entry.data);
          const checksum = crc32(data);
          const size = data.length;
          if (offset + size > 0xffffffff) throw new Error("当前浏览器导出超过 4GB，请按终端分批导出。");
          const localHeader = concatBytes([
            bytesLE(0x04034b50, 4), bytesLE(20, 2), bytesLE(0x0800, 2), bytesLE(0, 2),
            bytesLE(stamp.time, 2), bytesLE(stamp.date, 2), bytesLE(checksum, 4), bytesLE(size, 4),
            bytesLE(size, 4), bytesLE(nameBytes.length, 2), bytesLE(0, 2), nameBytes, data,
          ]);
          localParts.push(localHeader);
          centralParts.push(concatBytes([
            bytesLE(0x02014b50, 4), bytesLE(20, 2), bytesLE(20, 2), bytesLE(0x0800, 2), bytesLE(0, 2),
            bytesLE(stamp.time, 2), bytesLE(stamp.date, 2), bytesLE(checksum, 4), bytesLE(size, 4),
            bytesLE(size, 4), bytesLE(nameBytes.length, 2), bytesLE(0, 2), bytesLE(0, 2),
            bytesLE(0, 2), bytesLE(0, 2), bytesLE(0, 4), bytesLE(offset, 4), nameBytes,
          ]));
          offset += localHeader.length;
        }
        const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
        const end = concatBytes([
          bytesLE(0x06054b50, 4), bytesLE(0, 2), bytesLE(0, 2), bytesLE(entries.length, 2),
          bytesLE(entries.length, 2), bytesLE(centralSize, 4), bytesLE(offset, 4), bytesLE(0, 2),
        ]);
        return new Blob([...localParts, ...centralParts, end], { type: "application/zip" });
      }
      function safePathPart(value, fallback) {
        const cleaned = String(value || fallback || "").replace(/[<>:"/\\|?*\x00-\x1f]/g, "_").replace(/\s+/g, " ").trim();
        return (cleaned || fallback || "未命名").slice(0, 96);
      }
      function csvCell(value) {
        const text = String(value ?? "");
        return `"${text.replaceAll('"', '""')}"`;
      }
      function buildCsv(rows) {
        return `\ufeff${rows.map((row) => row.map(csvCell).join(",")).join("\r\n")}`;
      }
      function absoluteImageUrl(url) {
        const value = String(url || "").trim();
        return value ? new URL(value, location.origin).href : "";
      }
      function photoExportUrl(photo) {
        return photo?.delivery_cache_url || photo?.preview_url || photo?.image_url || "";
      }
      function imageExtension(photo, blob) {
        const typeMap = { "image/jpeg": ".jpg", "image/png": ".png", "image/webp": ".webp", "image/bmp": ".bmp", "image/gif": ".gif" };
        const fromType = typeMap[String(blob?.type || "").toLowerCase()];
        if (fromType) return fromType;
        const path = String(photo.image_url || "").split("?", 1)[0].toLowerCase();
        const match = path.match(/\.(jpg|jpeg|png|webp|bmp|gif)$/);
        return match ? `.${match[1]}` : ".jpg";
      }
      async function fetchImageBlob(url) {
        const requestUrl = new URL(url, location.origin);
        const directOptions = requestUrl.origin === location.origin ? { headers: teamHeaders() } : {};
        try {
          const response = await fetch(requestUrl.href, directOptions);
          if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
          return await response.blob();
        } catch (directError) {
          if (requestUrl.origin === location.origin) throw directError;
          const proxyResponse = await fetch(`/local-test/photo-proxy?url=${encodeURIComponent(requestUrl.href)}`, { headers: teamHeaders() });
          if (!proxyResponse.ok) throw directError;
          return await proxyResponse.blob();
        }
      }
      function uniqueName(folderNames, desiredName) {
        const dotIndex = desiredName.lastIndexOf(".");
        const base = dotIndex > 0 ? desiredName.slice(0, dotIndex) : desiredName;
        const suffix = dotIndex > 0 ? desiredName.slice(dotIndex) : "";
        let candidate = desiredName;
        let counter = 2;
        while (folderNames.has(candidate)) {
          candidate = `${base}-${counter}${suffix}`;
          counter += 1;
        }
        folderNames.add(candidate);
        return candidate;
      }
      function triggerDownload(blob, filename) {
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        URL.revokeObjectURL(link.href);
        link.remove();
      }
      async function runConcurrentJobs(jobs, limit) {
        let cursor = 0;
        const workers = Array.from({ length: Math.min(limit, jobs.length) }, async () => {
          while (cursor < jobs.length) {
            const job = jobs[cursor];
            cursor += 1;
            await job();
          }
        });
        await Promise.all(workers);
      }
      function importProgressRate(progress = {}) {
        const phase = progress.phase || "queued";
        const totalDetails = Number(progress.total_detail_pages || 0);
        const processedDetails = Number(progress.processed_detail_pages || 0);
        const totalRecords = Number(progress.total_records || 0);
        const processedRecords = Number(progress.processed_records || 0);
        const totalOssPhotos = Number(progress.total_photos || 0);
        const processedOssPhotos = Number(progress.processed_photos || 0);
        if (phase === "queued") return 0.01;
        if (phase === "starting") return 0.04;
        if (phase === "parsed") return 0.08;
        if (phase === "resolving_photos" && totalDetails) return 0.12 + Math.min(0.35, 0.35 * (processedDetails / totalDetails));
        if (phase === "linking_photos" && totalRecords) return 0.52 + Math.min(0.42, 0.42 * (processedRecords / totalRecords));
        if (phase === "oss_uploading" && totalOssPhotos) return 0.94 + Math.min(0.05, 0.05 * (processedOssPhotos / totalOssPhotos));
        if (phase === "complete") return 1;
        if (phase === "failed") return 1;
        return 0.5;
      }
      function importProgressDetail(progress = {}, job = {}) {
        const phase = progress.phase || job.status || "queued";
        const result = job.result || {};
        if (phase === "queued") return `等待导入 ${job.filename || ""}`;
        if (phase === "starting") return "正在启动后台导入任务";
        if (phase === "parsed") return `已解析 ${progress.template_rows || progress.total_records || 0} 行，准备读取照片`;
        if (phase === "resolving_photos") {
          return `解析照片页 ${progress.processed_detail_pages || 0}/${progress.total_detail_pages || 0}，已发现 ${progress.resolved_image_urls || 0} 张照片`;
        }
        if (phase === "linking_photos") {
          return `写入照片 ${progress.processed_records || 0}/${progress.total_records || 0}，已处理 ${progress.processed_photos || 0} 张`;
        }
        if (phase === "oss_uploading") {
          return `OSS 入库 ${progress.processed_photos || 0}/${progress.total_photos || 0}，成功 ${progress.uploaded_photos || 0} 张，失败 ${progress.failed_photos || 0} 张`;
        }
        if (phase === "complete") {
          return `读取 ${result.template_rows || progress.total_records || 0} 行，匹配 ${result.applied_records || progress.applied_records || 0} 张，重复跳过 ${result.skipped_duplicates || progress.skipped_duplicates || 0} 张`;
        }
        if (phase === "failed") return job.error || "扫码表格导入失败";
        return "导入中";
      }
      async function startShellScanImport(message = {}) {
        if (shellImportActive) {
          setExportStatus("导入任务进行中", "当前已有扫码表格导入任务，请等待完成后再提交。", 0);
          return;
        }
        const file = message.file;
        if (!file) {
          setExportStatus("导入失败", "没有收到需要导入的表格文件。", 0, true);
          return;
        }
        shellImportActive = true;
        try {
          setExportStatus("提交扫码表格", `正在提交 ${message.filename || file.name || "scan.xlsx"}`, 0.02);
          const formData = new FormData();
          formData.append("file", file, message.filename || file.name || "scan.xlsx");
          const response = await fetch("/local-test/scan/import-template-xlsx/jobs", { method: "POST", headers: teamHeaders(), body: formData });
          const payload = await response.json();
          if (!response.ok || payload.error) throw new Error(payload.detail || payload.error?.message || response.statusText);
          let job = payload.data;
          let lastRefreshKey = "";
          while (true) {
            job = await shellApi(`/local-test/scan/import-template-xlsx/jobs/${encodeURIComponent(job.job_id)}`);
            const progress = job.progress || {};
            setExportStatus("导入扫码表格", importProgressDetail(progress, job), importProgressRate(progress));
            const processedPhotos = Number(progress.processed_photos || progress.resolved_image_urls || 0);
            const refreshKey = `${job.status}:${progress.phase}:${processedPhotos}:${progress.processed_records || 0}`;
            const shouldRefresh = job.status === "complete" || (processedPhotos > 0 && processedPhotos % 5 === 0) || progress.phase === "parsed";
            if (shouldRefresh && refreshKey !== lastRefreshKey) {
              lastRefreshKey = refreshKey;
              broadcastDataRefresh("scan-import-progress", { job_id: job.job_id, status: job.status });
            }
            if (job.status === "complete") {
              setExportStatus("导入完成", importProgressDetail({ phase: "complete", ...progress }, job), 1, true);
              broadcastDataRefresh("scan-import-complete", { job_id: job.job_id });
              break;
            }
            if (job.status === "failed") throw new Error(job.error || "扫码表格导入失败");
            await delay(1000);
          }
        } catch (error) {
          setExportStatus("导入失败", error.message || "扫码表格导入失败", 1, true);
        } finally {
          shellImportActive = false;
        }
      }
      async function startShellExport(scope) {
        if (shellExportActive) {
          setExportStatus("导出任务进行中", "当前已有导出任务，请等待完成后再发起新的终端包。", 0);
          return;
        }
        if (!scope?.taskId || !scope?.terminal) {
          setExportStatus("导出失败", "只支持单终端导出，请从终端任务行发起。", 0, true);
          return;
        }
        shellExportActive = true;
        const reviewScope = scope.reviewScope || "reviewed";
        const terminalName = scope.terminal || `task-${scope.taskId}`;
        try {
          setExportStatus("准备导出终端包", `正在读取 ${terminalName} 的清单`, 0.02);
          const params = new URLSearchParams({ task_id: String(scope.taskId), terminal: terminalName, review_scope: reviewScope });
          const manifest = await shellApi(`/local-test/export-manifest/final-delivery?${params.toString()}`);
          const groups = manifest.groups || [];
          if (!groups.length) throw new Error(reviewScope === "reviewed" ? "当前终端还没有已审阅完成的资料。" : "当前终端没有可导出的资料。");
          const entries = [];
          const csvRows = [[
            "终端", "安装地址", "表号", "资料组ID", "状态", "审阅人", "照片数", "导出照片数",
            "照片1分类", "照片1地址", "照片2分类", "照片2地址", "照片3分类", "照片3地址", "照片4分类", "照片4地址",
          ]];
          const downloadJobs = [];
          let downloaded = 0;
          let failed = 0;
          for (const group of groups) {
            const photos = (group.photos || []).filter((photo) => photoExportUrl(photo)).slice(0, 4);
            const row = [
              group.terminal || "", group.address || "", group.meter_no || "", group.id || "", group.status || "",
              group.reviewer || "", group.photo_count || 0, photos.length,
            ];
            for (let index = 0; index < 4; index += 1) {
              row.push(photos[index]?.category_label || "");
              row.push(photoExportUrl(photos[index]) || "");
            }
            csvRows.push(row);
            if (!photos.length) continue;
            const terminal = safePathPart(group.terminal, "未关联终端");
            const address = safePathPart(group.address || group.meter_no || group.id, "未填写地址");
            const folder = `${terminal}/${address}`;
            const usedNames = new Set();
            for (const [photoIndex, photo] of photos.entries()) {
              downloadJobs.push(async () => {
                const url = absoluteImageUrl(photoExportUrl(photo));
                try {
                  const blob = await fetchImageBlob(url);
                  const archiveName = safePathPart(photo.archive_filename || photo.category_label || `图片${photoIndex + 1}`, `图片${photoIndex + 1}`);
                  const extension = imageExtension(photo, blob);
                  const withoutExt = archiveName.replace(/\.(jpg|jpeg|png|webp|bmp|gif)$/i, "");
                  const filename = uniqueName(usedNames, `${String(photoIndex + 1).padStart(2, "0")}-${withoutExt}${extension}`);
                  entries.push({ name: `${folder}/${filename}`, data: blob });
                  downloaded += 1;
                } catch (error) {
                  const filename = uniqueName(usedNames, `${String(photoIndex + 1).padStart(2, "0")}-下载失败.txt`);
                  entries.push({
                    name: `${folder}/${filename}`,
                    data: `图片下载失败，请检查照片地址是否可访问。\r\n资料组：${group.id || ""}\r\n表号：${group.meter_no || ""}\r\n地址：${url}\r\n错误：${error.message}`,
                  });
                  failed += 1;
                }
                const finished = downloaded + failed;
                setExportStatus("导出终端包", `并发下载图片 ${finished}/${downloadJobs.length}`, downloadJobs.length ? finished / downloadJobs.length : 0.5);
              });
            }
          }
          if (downloadJobs.length) {
            setExportStatus("导出终端包", `并发下载图片 0/${downloadJobs.length}`, 0.05);
            await runConcurrentJobs(downloadJobs, 6);
          }
          entries.sort((left, right) => left.name.localeCompare(right.name, "zh-Hans"));
          entries.unshift({ name: "清单表格.csv", data: buildCsv(csvRows) });
          setExportStatus("生成压缩包", "正在打包清单和照片", 0.96);
          const zip = await createZipBlob(entries);
          const stamp = new Date().toISOString().replace(/[-:T]/g, "").slice(0, 14);
          const scopeName = safePathPart(terminalName, "终端");
          const scopeLabel = reviewScope === "all" ? "all" : "reviewed";
          triggerDownload(zip, `终端-${scopeName}-${scopeLabel}-${stamp}.zip`);
          setExportStatus("导出完成", failed ? `压缩包已生成，${failed} 张图片下载失败` : `压缩包已生成，已下载 ${downloaded} 张图片`, 1, true);
        } catch (error) {
          setExportStatus("导出失败", error.message || "导出任务失败", 1, true);
        } finally {
          shellExportActive = false;
        }
      }
      window.addEventListener("message", (event) => {
        if (event.origin !== location.origin) return;
        const message = event.data || {};
        if (message.type === "module-manager:start-terminal-export") startShellExport(message.scope || {});
        if (message.type === "module-manager:start-scan-import") startShellScanImport(message);
        if (message.type === "module-manager:data-mutated") broadcastDataRefresh(message.reason || "data-mutated", message.payload || {});
      });
      function openPage(page, replace = false) {
        const targetPage = pageMeta[page] && canOpenPage(page) ? page : defaultPage;
        const meta = pageMeta[targetPage] || pageMeta[defaultPage];
        document.body.dataset.currentPage = targetPage;
        pageTitle.textContent = meta.title;
        frame.src = meta.src;
        frame.dataset.page = targetPage;
        document.querySelectorAll("[data-page]").forEach((button) => {
          button.classList.toggle("active", button.dataset.page === targetPage);
        });
        const nextUrl = `/app?page=${encodeURIComponent(targetPage)}`;
        if (replace) history.replaceState({ page: targetPage }, "", nextUrl);
        else history.pushState({ page: targetPage }, "", nextUrl);
      }
      frame.addEventListener("load", () => {
        postRefreshToFrame("page-open", { page: frame.dataset.page || initialPage });
      });
      document.querySelectorAll("[data-page]").forEach((button) => {
        if (!canOpenPage(button.dataset.page)) {
          button.remove();
          return;
        }
        button.addEventListener("click", () => openPage(button.dataset.page));
      });
      window.addEventListener("popstate", () => {
        const page = new URLSearchParams(location.search).get("page") || defaultPage;
        openPage(page, true);
      });
      openPage(initialPage, true);
    </script>
  </body>
</html>
