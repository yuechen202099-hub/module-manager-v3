<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>项目看板</title>
    <style>
      :root {
        --bg: #eef2f5;
        --topbar: #111820;
        --topbar-2: #182330;
        --surface: #ffffff;
        --surface-2: #f7f9fb;
        --ink: #101820;
        --muted: #667280;
        --line: #d8e0e7;
        --accent: #0f6f8f;
        --ok: #275e4f;
        --warn: #956012;
        --bad: #a32920;
        --shadow: 0 18px 46px rgba(16, 31, 45, .08);
        --topbar-height: 64px;
        --page-nav-width: 440px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, rgba(17, 24, 32, .055), transparent 220px), var(--bg);
      }
      h1, h2, h3, p { margin: 0; }
      button, .button {
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255,255,255,.14);
        border-radius: 8px;
        padding: 0 12px;
        color: #edf7fb;
        background: rgba(255,255,255,.08);
        font-weight: 900;
        text-decoration: none;
        cursor: pointer;
        white-space: nowrap;
      }
      button.primary, .button.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
      button:hover, .button:hover { background: rgba(255,255,255,.14); }
      button.primary:hover { background: #0b607c; }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        height: var(--topbar-height);
        min-height: var(--topbar-height);
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        padding: 0 20px;
        border-bottom: 1px solid rgba(255,255,255,.08);
        background: linear-gradient(180deg, var(--topbar), var(--topbar-2));
        box-shadow: 0 14px 34px rgba(17,24,32,.16);
        overflow: hidden;
      }
      .brand {
        min-width: 0;
        height: 40px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .mark {
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        border-radius: 9px;
        background: rgba(255,255,255,.08);
        border: 1px solid rgba(255,255,255,.12);
        color: #d9f5ff;
        font-size: 13px;
        font-weight: 900;
      }
      .brand h1 {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #f7fbff;
        font-size: 17px;
        line-height: 20px;
      }
      .brand p {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #8fa0ad;
        font-size: 12px;
        line-height: 16px;
      }
      .actions {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .actions::-webkit-scrollbar { display: none; }
      .page-nav {
        width: min(var(--page-nav-width), 100%);
        height: 38px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px;
        border: 1px solid rgba(255,255,255,.11);
        border-radius: 10px;
        background: rgba(255,255,255,.05);
        flex: 0 0 auto;
      }
      .page-nav .button {
        min-width: 0;
        height: 30px;
        flex: 1 1 0;
        padding: 0 8px;
        border-color: transparent;
        background: transparent;
        color: #b9c8d3;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .page-nav .active {
        background: #eaf7fb;
        color: #06384a;
        box-shadow: 0 8px 18px rgba(0,0,0,.16);
      }
      .user-pill {
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 8px;
        padding: 0 10px;
        color: #d7e3ec;
        background: rgba(255,255,255,.07);
        font-size: 12px;
        font-weight: 900;
        white-space: nowrap;
      }
      main {
        width: min(1560px, 100%);
        margin: 0 auto;
        padding: 12px;
        display: grid;
        gap: 12px;
      }
      .stats { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 8px; }
      .stat, .panel {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }
      .stat {
        min-height: 84px;
        display: grid;
        align-content: space-between;
        padding: 11px;
        border-top: 3px solid rgba(15,111,143,.72);
      }
      .stat span, .muted { color: var(--muted); font-size: 12px; }
      .stat span { font-weight: 900; }
      .stat strong { font-size: 26px; }
      .grid { display: grid; grid-template-columns: 1.08fr .92fr; gap: 12px; }
      .panel { overflow: hidden; }
      .panel-head {
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, #fff, var(--surface-2));
        font-weight: 900;
      }
      .panel-body { padding: 12px; }
      .carousel { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-bottom: 10px; }
      .slide {
        min-height: 96px;
        display: grid;
        align-content: space-between;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: linear-gradient(180deg, #fff, #f7fafb);
      }
      .slide span { color: var(--muted); font-size: 12px; font-weight: 900; }
      .slide strong { font-size: 28px; }
      .bar { height: 9px; border-radius: 99px; background: #e8edf2; overflow: hidden; }
      .bar i { display: block; height: 100%; width: var(--value); background: var(--accent); }
      .chart-strip { display: grid; grid-template-columns: 210px 1fr; gap: 14px; align-items: center; }
      .donut { width: 188px; height: 188px; display: block; margin: 0 auto; }
      .donut text { font-family: inherit; font-weight: 900; fill: var(--ink); }
      .bar-list, .status-list { display: grid; gap: 10px; }
      .bar-row { display: grid; grid-template-columns: 118px 1fr 48px; gap: 10px; align-items: center; font-size: 12px; }
      .risk-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 10px; }
      .risk-card {
        min-height: 78px;
        display: grid;
        align-content: space-between;
        padding: 11px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
      }
      .risk-card strong { font-size: 22px; }
      .risk-card.warn { color: var(--warn); }
      .risk-card.bad { color: var(--bad); }
      .status-row { display: grid; grid-template-columns: 84px 1fr 42px; gap: 9px; align-items: center; font-size: 12px; color: var(--muted); }
      .table-scroll { max-height: 310px; overflow: auto; padding: 0; }
      .table-scroll thead th { position: sticky; top: 0; z-index: 1; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { padding: 9px 10px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
      th { color: var(--muted); background: #f2f6f8; font-size: 12px; }
      .ok { color: var(--ok); font-weight: 900; }
      .warn-text { color: var(--warn); font-weight: 900; }
      .empty-state {
        min-height: 130px;
        display: grid;
        align-content: center;
        gap: 8px;
        padding: 16px;
        border: 1px dashed #c8d4dd;
        border-radius: 10px;
        background: linear-gradient(180deg, #fff, #f8fbfc);
        color: var(--muted);
      }
      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        opacity: 0;
        transform: translateY(8px);
        transition: .16s ease;
        z-index: 30;
        padding: 12px 14px;
        border-radius: 9px;
        color: #fff;
        background: #17212b;
      }
      .toast.show { opacity: 1; transform: translateY(0); }
      .admin-only { display: none !important; }
      body.can-admin .admin-only { display: block !important; }
      body.embedded .topbar { display: none; }
      body.embedded main { width: 100%; padding: 8px; }
      #totalImportFile, #importFile { display: none; }
      .operation-panel .panel-body { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
      .operation-card {
        min-height: 92px;
        display: grid;
        align-content: space-between;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: linear-gradient(180deg, #fff, #f7fafb);
      }
      .operation-card strong { font-size: 15px; }
      .operation-card span { color: var(--muted); font-size: 12px; line-height: 1.45; }
      .operation-card button {
        width: max-content;
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }
      .account-grid {
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        gap: 12px;
      }
      .account-form {
        display: grid;
        gap: 10px;
      }
      .account-form label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }
      .account-form input,
      .account-form select {
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 10px;
        color: var(--ink);
        background: #fff;
        font: inherit;
      }
      .account-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .account-actions button {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }
      .account-table-wrap { max-height: 260px; overflow: auto; border: 1px solid var(--line); border-radius: 10px; }
      .account-table-wrap table { font-size: 12px; }
      .account-table-wrap button { color: var(--ink); border-color: var(--line); background: #fff; }
      .account-table-wrap button.danger { color: #a9352b; border-color: rgba(169, 53, 43, .28); background: #fff8f7; }
      .system-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
      .system-card {
        min-height: 88px;
        display: grid;
        align-content: space-between;
        gap: 8px;
        padding: 11px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
      }
      .system-card span { color: var(--muted); font-size: 12px; font-weight: 900; }
      .system-card strong { font-size: 20px; overflow-wrap: anywhere; }
      .system-card.warn { border-color: rgba(149, 96, 18, .45); background: #fff9ef; }
      .system-card.bad { border-color: rgba(163, 41, 32, .45); background: #fff4f2; }
      .system-warnings {
        grid-column: 1 / -1;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }
      .system-warnings b {
        border: 1px solid rgba(163,41,32,.24);
        border-radius: 999px;
        padding: 5px 8px;
        color: var(--bad);
        background: #fff4f2;
      }
      .export-scope {
        height: 30px;
        margin-left: 6px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font-weight: 800;
      }
      @media (max-width: 1100px) {
        .topbar { grid-template-columns: 210px minmax(0, 1fr); padding: 0 12px; }
        .brand p, .user-pill { display: none; }
        .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .grid, .chart-strip, .carousel, .account-grid, .system-grid { grid-template-columns: 1fr; }
        .system-warnings { grid-column: auto; }
        .panel-head { cursor: pointer; }
        .panel-head::after { content: "收起"; flex: 0 0 auto; color: var(--muted); font-size: 12px; font-weight: 900; }
        .panel.is-collapsed .panel-body { display: none; }
        .panel.is-collapsed .panel-head::after { content: "展开"; color: var(--accent); }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="mark">V2</div>
        <div>
          <h1>项目看板</h1>
          <p>总清单、终端任务、归档进度</p>
        </div>
      </div>
      <div class="actions">
        <nav class="page-nav" aria-label="页面切换">
          <a class="button active" href="/project-board">项目看板</a>
          <a class="button" href="/claim-tasks">任务领取</a>
          <a class="button" href="/task-hall">审阅工作台</a>
        </nav>
        <span class="user-pill" id="sessionUser">未登录</span>
        <button id="logout" type="button">退出</button>
      </div>
    </header>
    <main>
      <section class="stats" id="stats"></section>
      <section class="panel operation-panel admin-only">
        <div class="panel-head">数据导入与交付</div>
        <div class="panel-body">
          <article class="operation-card">
            <strong>导入总清单</strong>
            <span>每个团队首次使用先导入总清单，用表号、终端、安装地址生成独立资料组。</span>
            <button class="primary" id="totalImportButton" type="button">导入总清单</button>
          </article>
          <article class="operation-card">
            <strong>导入扫码表格</strong>
            <span>导入带照片链接的扫码表格，系统按表号匹配并跳过重复资料。</span>
            <button class="primary" id="importButton" type="button">导入扫码表格</button>
          </article>
          <article class="operation-card">
            <strong>导出交付资料</strong>
            <span>交付包按终端在下方任务表中导出，可选择已归档或全部数据。</span>
            <button id="exportFinal" type="button" hidden>导出最终交付</button>
          </article>
          <input id="totalImportFile" type="file" accept=".xlsx,.xls" />
          <input id="importFile" type="file" accept=".xlsx,.xls" />
        </div>
      </section>
      <section class="panel admin-only system-panel">
        <div class="panel-head">
          <span>系统状态</span>
          <button id="refreshSystemStatus" type="button">刷新状态</button>
        </div>
        <div class="panel-body">
          <div class="system-grid" id="systemStatus">
            <article class="system-card"><span>运行状态</span><strong>等待加载</strong></article>
          </div>
        </div>
      </section>
      <section class="grid">
        <div class="panel">
          <div class="panel-head">项目进度总览</div>
          <div class="panel-body">
            <div class="carousel" id="progressCarousel"></div>
            <div class="chart-strip">
              <svg class="donut" viewBox="0 0 120 120" aria-label="项目进度">
                <circle cx="60" cy="60" r="46" fill="none" stroke="#e3e9ee" stroke-width="13" />
                <circle id="donutArc" cx="60" cy="60" r="46" fill="none" stroke="#0f6f8f" stroke-width="13" stroke-linecap="round" transform="rotate(-90 60 60)" />
                <text id="donutText" x="60" y="58" text-anchor="middle" font-size="18">0%</text>
                <text x="60" y="75" text-anchor="middle" font-size="8">项目进度</text>
              </svg>
              <div>
                <div class="muted" style="font-weight:900;margin-bottom:10px;">安装人员资料组占比</div>
                <div class="bar-list" id="installerShare"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <span>风险与审阅分布</span>
            <button id="exportExceptionMeters" type="button">导出异常表计</button>
          </div>
          <div class="panel-body">
            <div class="risk-grid" id="riskGrid"></div>
            <div class="status-list" id="statusBars"></div>
          </div>
        </div>
      </section>
      <section class="panel admin-only" id="accountPanel">
        <div class="panel-head">
          <span>账号管理</span>
          <button id="refreshUsers" type="button">刷新账号</button>
        </div>
        <div class="panel-body account-grid">
          <form class="account-form" id="accountForm">
            <label>账号
              <input id="accountUsername" autocomplete="off" placeholder="例如 reviewer-a" required />
            </label>
            <label>姓名
              <input id="accountName" autocomplete="off" placeholder="审阅员姓名" />
            </label>
            <label>初始/新密码
              <input id="accountPassword" type="password" autocomplete="new-password" placeholder="新账号必填，更新资料可留空" />
            </label>
            <label>团队
              <input id="accountTeam" autocomplete="off" placeholder="例如 north-team-01" />
            </label>
            <label>角色
              <select id="accountRole">
                <option value="reviewer">审阅员</option>
                <option value="constructor">施工员</option>
                <option value="admin">管理员</option>
              </select>
            </label>
            <label>状态
              <select id="accountStatus">
                <option value="active">启用</option>
                <option value="disabled">停用</option>
              </select>
            </label>
            <div class="account-actions">
              <button class="primary" id="saveAccount" type="submit">保存账号</button>
              <button id="clearAccountForm" type="button">清空</button>
            </div>
          </form>
          <div class="account-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>账号</th>
                  <th>姓名</th>
                  <th>团队</th>
                  <th>角色</th>
                  <th>状态</th>
                  <th>最近登录</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="accountRows"></tbody>
            </table>
          </div>
        </div>
      </section>
      <section class="panel">
        <div class="panel-head">终端任务进度</div>
        <div class="panel-body table-scroll">
          <table>
            <thead>
              <tr>
                <th>终端</th>
                <th>改造数量</th>
                <th>已上传</th>
                <th>未归档</th>
                <th>上传率</th>
                <th>归档率</th>
                <th>领取人</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="taskRows"></tbody>
          </table>
        </div>
      </section>
    </main>
    <div class="toast" id="toast"></div>
    <script>
      if (new URLSearchParams(location.search).get("embedded") === "1") document.body.classList.add("embedded");
      const session = JSON.parse(localStorage.getItem("module_manager_session") || "null");
      if (!document.body.classList.contains("embedded") && !session?.access_token) location.href = "/login";
      const roles = session?.user?.roles || [];
      const isAdmin = roles.includes("admin");
      if (isAdmin) document.body.classList.add("can-admin");
      const teamId = session?.team_id || session?.user?.team_id || localStorage.getItem("module_manager_team_id") || "default-team";
      localStorage.setItem("module_manager_team_id", teamId);
      const reviewer = session?.user?.username || localStorage.getItem("module_manager_reviewer") || "reviewer";
      const sessionUser = document.querySelector("#sessionUser");
      if (sessionUser) sessionUser.textContent = session.user?.name || session.user?.username || "用户";
      document.querySelector("#logout").addEventListener("click", () => {
        localStorage.removeItem("module_manager_session");
        location.href = "/login";
      });
      const pct = (value) => `${Math.round((Number(value) || 0) * 100)}%`;
      const barWidth = (value) => `${Math.max(1, Math.round((Number(value) || 0) * 100))}%`;
      const esc = (value) => String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
      const authHeaders = () => session?.access_token ? { Authorization: `${session.token_type || "bearer"} ${session.access_token}` } : {};
      const teamHeaders = (extra = {}) => ({ "X-Team-Id": teamId, ...authHeaders(), ...extra });
      async function api(path) {
        const response = await fetch(path, { headers: teamHeaders() });
        const payload = await response.json();
        if (!response.ok || payload.error) throw new Error(payload.detail || payload.error?.message || response.statusText);
        return payload.data;
      }
      async function jsonApi(path, body, method = "POST") {
        const response = await fetch(path, {
          method,
          headers: teamHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify(body),
        });
        const payload = await response.json();
        if (!response.ok || payload.error) throw new Error(payload.detail || payload.error?.message || response.statusText);
        return payload.data;
      }
      function toast(message, bad = false) {
        const node = document.querySelector("#toast");
        node.textContent = message;
        node.style.background = bad ? "var(--bad)" : "#17212b";
        node.classList.add("show");
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => node.classList.remove("show"), 2400);
      }
      function notifyParentRefresh(reason, payload = {}) {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: "module-manager:data-mutated", reason, payload }, location.origin);
        }
      }
      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      function formatBytes(bytes) {
        const value = Number(bytes || 0);
        if (value >= 1024 * 1024 * 1024) return `${(value / 1024 / 1024 / 1024).toFixed(1)} GB`;
        if (value >= 1024 * 1024) return `${(value / 1024 / 1024).toFixed(1)} MB`;
        if (value >= 1024) return `${(value / 1024).toFixed(1)} KB`;
        return `${value} B`;
      }
      function formatHours(hours) {
        if (hours === null || hours === undefined || Number.isNaN(Number(hours))) return "无记录";
        const value = Number(hours);
        if (value < 1) return `${Math.round(value * 60)} 分钟`;
        if (value < 48) return `${value.toFixed(1)} 小时`;
        return `${Math.round(value / 24)} 天`;
      }
      function renderSystemStatus(status) {
        const node = document.querySelector("#systemStatus");
        if (!node || !isAdmin) return;
        if (!status) {

                  downloaded += 1;
                } catch (error) {
                  const filename = uniqueName(usedNames, `${String(photoIndex + 1).padStart(2, "0")}-下载失败.txt`);
                  entries.push({
                    name: `${folder}/${filename}`,
                    data: `图片下载失败，请检查图片 URL 是否可访问。\r\n资料组：${group.id || ""}\r\n表号：${group.meter_no || ""}\r\nURL：${url}\r\n错误：${error.message}`,
                  });
                  failed += 1;
                }
                button.textContent = `并发下载图片 ${downloaded + failed}/${downloadJobs.length}`;
              });
            }
          }
          if (downloadJobs.length) {
            button.textContent = `并发下载图片 0/${downloadJobs.length}`;
            await runConcurrentJobs(downloadJobs, DELIVERY_DOWNLOAD_CONCURRENCY);
          }
          entries.sort((left, right) => left.name.localeCompare(right.name, "zh-Hans"));
          entries.unshift({ name: "清单表格.csv", data: buildCsv(csvRows) });
          button.textContent = "生成压缩包...";
          const zip = await createZipBlob(entries);
          const stamp = new Date().toISOString().replace(/[-:T]/g, "").slice(0, 14);
          const scopeName = safePathPart(scope.terminal || groups[0]?.terminal || `task-${scope.taskId}`, "终端");
          const scopeLabel = (scope.reviewScope || "reviewed") === "all" ? "all" : "reviewed";
          triggerDownload(zip, `终端-${scopeName}-${scopeLabel}-${stamp}.zip`);
          toast(failed ? `压缩包已生成，${failed} 张图片下载失败` : `压缩包已生成，并发下载 ${downloaded} 张图片`);
          return;
          triggerDownload(zip, `最终交付-${stamp}.zip`);
          toast(failed ? `压缩包已生成，${failed} 张图片下载失败` : `压缩包已生成，并发下载 ${downloaded} 张图片`);
        } finally {
          button.textContent = originalText;
          button.disabled = false;
        }
      }
      async function exportTerminalDelivery(taskId, terminal, button, reviewScope = "reviewed") {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(
            {
              type: "module-manager:start-terminal-export",
              scope: { taskId, terminal, reviewScope, teamId },
            },
            location.origin,
          );
          toast("导出任务已提交，切换页面也会继续下载");
          const originalText = button.textContent;
          button.textContent = "已提交导出";
          button.disabled = true;
          setTimeout(() => {
            button.textContent = originalText;
            button.disabled = false;
          }, 1600);
          return;
        }
        return exportFinalDeliveryZipConcurrent({ taskId, terminal, button, reviewScope });
      }
      async function exportTaskDetail(taskId) {
        await downloadExcel("/exports/task-detail", { task_id: taskId }, `task-detail-${taskId}.xlsx`);
        toast("任务明细已导出");
      }
      async function exportExceptionMeters() {
        await downloadExcel("/exports/exception-meters", { reviewer: isAdmin ? "" : reviewer }, `exception-meters-${Date.now()}.xlsx`);
        toast("异常表计已导出");
      }
      async function exportFinalDeliveryZip() {
        return exportFinalDeliveryZipConcurrent();
        const button = document.querySelector("#exportFinal");
        const originalText = button.textContent;
        button.disabled = true;
        try {
          button.textContent = "准备清单...";
          const manifest = await api("/local-test/export-manifest/final-delivery");
          const entries = [];
          const csvRows = [[
            "终端", "安装地址", "表号", "资料组ID", "状态", "审阅人", "照片数", "导出照片数",
            "照片1分类", "照片1URL", "照片2分类", "照片2URL", "照片3分类", "照片3URL", "照片4分类", "照片4URL",
          ]];
          const groups = manifest.groups || [];
          const totalPhotos = groups.reduce((sum, group) => sum + Math.min(4, (group.photos || []).filter((photo) => photoExportUrl(photo)).length), 0);
          if (!totalPhotos) throw new Error("当前没有可下载的图片 URL，请先在项目看板导入带“图片 (电脑查看)”列的扫码表格。");
          let downloaded = 0;
          let failed = 0;
          for (const group of groups) {
            const photos = (group.photos || []).filter((photo) => photoExportUrl(photo)).slice(0, 4);
            const row = [
              group.terminal || "", group.address || "", group.meter_no || "", group.id || "", group.status || "",
              group.reviewer || "", group.photo_count || 0, photos.length,
            ];
            for (let index = 0; index < 4; index += 1) {
              row.push(photos[index]?.category_label || "");
              row.push(photoExportUrl(photos[index]) || "");
            }
            csvRows.push(row);
            if (!photos.length) continue;
            const terminal = safePathPart(group.terminal, "未关联终端");
            const address = safePathPart(group.address || group.meter_no || group.id, "未填写地址");
            const folder = `${terminal}/${address}`;
            const usedNames = new Set();
            for (const [photoIndex, photo] of photos.entries()) {
              const url = absoluteImageUrl(photoExportUrl(photo));
              button.textContent = `下载图片 ${downloaded + failed + 1}/${Math.max(totalPhotos, 1)}`;
              try {
                const blob = await fetchImageBlob(url);
                const archiveName = safePathPart(photo.archive_filename || photo.category_label || `图片${photoIndex + 1}`, `图片${photoIndex + 1}`);
                const extension = imageExtension(photo, blob);
                const withoutExt = archiveName.replace(/\.(jpg|jpeg|png|webp|bmp|gif)$/i, "");
                const filename = uniqueName(usedNames, `${String(photoIndex + 1).padStart(2, "0")}-${withoutExt}${extension}`);
                entries.push({ name: `${folder}/${filename}`, data: blob });
                downloaded += 1;
              } catch (error) {
                const filename = uniqueName(usedNames, `${String(photoIndex + 1).padStart(2, "0")}-下载失败.txt`);
                entries.push({
                  name: `${folder}/${filename}`,
                  data: `图片下载失败，请检查图片 URL 是否允许浏览器跨域访问。\r\n资料组：${group.id || ""}\r\n表号：${group.meter_no || ""}\r\nURL：${url}\r\n错误：${error.message}`,
                });
                failed += 1;
              }
            }
          }
          entries.unshift({ name: "清单表格.csv", data: buildCsv(csvRows) });
          button.textContent = "生成压缩包...";
          const zip = await createZipBlob(entries);
          const stamp = new Date().toISOString().replace(/[-:T]/g, "").slice(0, 14);
          triggerDownload(zip, `最终交付-${stamp}.zip`);
          toast(failed ? `压缩包已生成，${failed} 张图片需按 URL 补下载` : `压缩包已生成，已下载 ${downloaded} 张图片`);
        } finally {
          button.textContent = originalText;
          button.disabled = false;
        }
      }
      async function exportFinalDelivery() {
        return exportFinalDeliveryZip();
        await downloadExcel("/exports/final-delivery", { project_id: 1 }, "final-delivery.xlsx");
        toast("最终交付已导出");
      }
      async function importXlsx(file) {
        const button = document.querySelector("#importButton");
        const originalText = button.textContent;
        button.disabled = true;
        button.textContent = "提交到后台...";
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: "module-manager:start-scan-import", file, filename: file.name }, location.origin);
          toast("扫码表格已提交后台导入，切换页面也会继续执行");
          setTimeout(() => {
            button.disabled = false;
            button.textContent = originalText;
          }, 900);
          return;
        }
        const formData = new FormData();
        formData.append("file", file);
        button.textContent = "提交导入任务...";
        const response = await fetch("/local-test/scan/import-template-xlsx/jobs", { method: "POST", headers: teamHeaders(), body: formData });
        const payload = await response.json();
        if (!response.ok || payload.error) {
          button.disabled = false;
          button.textContent = originalText;
          throw new Error(payload.detail || payload.error?.message || response.statusText);
        }
        toast("扫码表格已进入后台导入，页面可继续使用");
        await watchScanImportJob(payload.data.job_id, button, originalText);
      }
      async function watchScanImportJob(jobId, button, originalText) {
        let lastRefreshAt = -1;
        try {
          while (true) {
            const job = await api(`/local-test/scan/import-template-xlsx/jobs/${encodeURIComponent(jobId)}`);
            const progress = job.progress || {};
            const processedPhotos = Number(progress.processed_photos || progress.resolved_image_urls || 0);
            const applied = Number(progress.applied_records || 0);
            let phaseText = {
              queued: "排队中",
              starting: "准备导入",
              parsed: "解析表格",
              resolving_photos: "解析照片",
              linking_photos: "写入照片",
              complete: "完成",
              failed: "失败",
            }[progress.phase || job.status] || "导入中";
            button.textContent = `${phaseText} ${processedPhotos} 张`;
            if ((progress.phase || job.status) === "oss_uploading") phaseText = "OSS 入库";
            if (processedPhotos !== lastRefreshAt && (processedPhotos % 5 === 0 || job.status === "complete")) {
              lastRefreshAt = processedPhotos;
              await init();
            }
            if (job.status === "complete") {
              const result = job.result || {};
              toast(`导入完成：读取 ${result.template_rows || 0} 行，匹配 ${result.applied_records || applied} 张照片`);
              await init();
              break;
            }
            if (job.status === "failed") throw new Error(job.error || "扫码表格导入失败");
            await delay(1000);
          }
        } finally {
          button.disabled = false;
          button.textContent = originalText;
        }
      }
      async function importTotalCatalog(file) {
        const formData = new FormData();
        formData.append("file", file);
        const response = await fetch("/local-test/catalog/total/import-xlsx", { method: "POST", headers: teamHeaders(), body: formData });
        const payload = await response.json();
        if (!response.ok || payload.error) throw new Error(payload.detail || payload.error?.message || response.statusText);
        toast(`总清单导入 ${payload.data.imported_rows || 0} 行，重复跳过 ${payload.data.skipped_duplicate_meters || 0} 行`);
        await init();
        notifyParentRefresh("catalog-imported");
      }
      async function init() {
        const [summary, tasks] = await Promise.all([api("/local-test/summary"), api("/local-test/tasks")]);
        renderStats(summary.summary, tasks.items || []);
        renderInstallerShare(summary.summary);
        renderTasks(tasks.items || []);
        if (isAdmin) loadSystemStatus().catch(() => renderSystemStatus(null));
      }
      if (isAdmin) {
        document.querySelector("#totalImportButton").addEventListener("click", () => document.querySelector("#totalImportFile").click());
        document.querySelector("#importButton").addEventListener("click", () => document.querySelector("#importFile").click());
        document.querySelector("#refreshSystemStatus").addEventListener("click", () => loadSystemStatus().catch((error) => toast(error.message, true)));
        document.querySelector("#exportFinal").hidden = true;
        document.querySelector("#exportFinal").addEventListener("click", () => exportFinalDelivery().catch((error) => toast(error.message, true)));
        document.querySelector("#accountForm").addEventListener("submit", (event) => saveAccount(event).catch((error) => toast(error.message, true)));
        document.querySelector("#clearAccountForm").addEventListener("click", clearAccountForm);
        document.querySelector("#refreshUsers").addEventListener("click", () => loadAccounts().catch((error) => toast(error.message, true)));
        document.querySelector("#totalImportFile").addEventListener("change", (event) => {
          const file = event.target.files?.[0];
          if (file) importTotalCatalog(file).catch((error) => toast(error.message, true));
          event.target.value = "";
        });
        document.querySelector("#importFile").addEventListener("change", (event) => {
          const file = event.target.files?.[0];
          if (file) importXlsx(file).catch((error) => toast(error.message, true));
          event.target.value = "";
        });
        clearAccountForm();
        loadAccounts().catch((error) => toast(error.message, true));
      }
      document.querySelector("#exportExceptionMeters").addEventListener("click", () => exportExceptionMeters().catch((error) => toast(error.message, true)));
      function setupMobilePanelCollapse() {
        const mobile = window.matchMedia("(max-width: 1100px)");
        document.querySelectorAll(".panel").forEach((panel) => {
          const head = panel.querySelector(".panel-head");
          if (!head || panel.dataset.collapseReady) return;
          panel.dataset.collapseReady = "1";
          head.addEventListener("click", (event) => {
            if (!mobile.matches || event.target.closest("button,a,input,select,label")) return;
            panel.classList.toggle("is-collapsed");
          });
        });
        mobile.addEventListener?.("change", () => {
          if (!mobile.matches) document.querySelectorAll(".panel.is-collapsed").forEach((panel) => panel.classList.remove("is-collapsed"));
        });
      }
      setupMobilePanelCollapse();
      let refreshTimer = null;
      function scheduleRefresh() {
        clearTimeout(refreshTimer);
        refreshTimer = setTimeout(() => init().catch((error) => toast(error.message, true)), 180);
      }
      window.addEventListener("message", (event) => {
        if (event.origin !== location.origin) return;
        if (event.data?.type === "module-manager:data-refresh") scheduleRefresh();
      });
      setInterval(scheduleRefresh, 15000);
      init().catch((error) => toast(error.message, true));
    </script>
  </body>
</html>
