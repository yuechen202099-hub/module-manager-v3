<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>任务领取</title>
    <style>
      :root {
        --bg: #f3f5f7;
        --surface: #fff;
        --surface-2: #f8fafb;
        --ink: #111827;
        --muted: #687386;
        --line: #d8dee6;
        --line-strong: #bdc7d2;
        --accent: #0f6f8f;
        --ok: #12664f;
        --warn: #956012;
        --shadow: 0 18px 45px rgba(22, 34, 48, .08);
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif; color: var(--ink); background: var(--bg); }
      button, input { font: inherit; }
      button, .button {
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 0 12px;
        background: var(--accent);
        color: #fff;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
      }
      button.secondary, .button.secondary { background: #fff; color: #06384a; border-color: var(--line-strong); }
      button:disabled { opacity: .52; cursor: not-allowed; }
      input { height: 34px; border: 1px solid var(--line); border-radius: 8px; padding: 0 10px; background: #fff; }
      h1, h2, p { margin: 0; }
      .app { min-height: 100vh; display: grid; grid-template-rows: 58px minmax(0, 1fr); }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255,255,255,.9);
      }
      .brand { display: flex; align-items: center; gap: 12px; }
      .mark { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 9px; background: #17212b; color: #d9f5ff; font-size: 13px; font-weight: 900; }
      h1 { font-size: 17px; }
      .muted { color: var(--muted); font-size: 12px; }
      .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      main { min-height: 0; display: grid; grid-template-columns: 330px minmax(0, 1fr); gap: 12px; padding: 12px; }
      .panel {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--line); background: var(--surface-2); }
      .panel-title { font-size: 14px; font-weight: 900; }
      .panel-body { min-height: 0; overflow: auto; padding: 10px; }
      .summary { display: grid; gap: 9px; }
      .stat { padding: 10px; border: 1px solid var(--line); border-radius: 9px; background: #fff; }
      .stat span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; }
      .stat strong { display: block; margin-top: 4px; font-size: 24px; }
      .bar { height: 8px; border-radius: 99px; background: #e8edf2; overflow: hidden; }
      .bar i { display: block; height: 100%; width: var(--value); background: var(--accent); }
      .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 10px; align-content: start; }
      .task {
        min-height: 188px;
        display: grid;
        align-content: space-between;
        gap: 9px;
        padding: 11px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
      }
      .name-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .name { font-weight: 900; }
      .badge { min-height: 22px; border-radius: 7px; padding: 2px 7px; background: #eef2f5; color: var(--muted); font-size: 12px; font-weight: 900; }
      .badge.ok { color: var(--ok); background: #e8f5ef; }
      .badge.warn { color: var(--warn); background: #fff4d8; }
      .metric-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 6px; }
      .metric { padding: 7px; border-radius: 8px; background: var(--surface-2); }
      .metric span { display: block; color: var(--muted); font-size: 11px; }
      .metric strong { display: block; margin-top: 2px; font-size: 14px; }
      .tool-row { display: flex; justify-content: space-between; gap: 8px; }
      .toast { position: fixed; right: 18px; bottom: 18px; opacity: 0; transform: translateY(8px); transition: .16s ease; padding: 12px 14px; border-radius: 9px; color: #fff; background: #17212b; }
      .toast.show { opacity: 1; transform: translateY(0); }
      body.embedded .topbar { display: none; }
      body.embedded .app { min-height: 100vh; grid-template-rows: minmax(0, 1fr); }
      body.embedded main { grid-template-columns: 260px minmax(0, 1fr); padding: 8px; }
      @media (max-width: 820px) { main, body.embedded main { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="mark">V2</div>
          <div>
            <h1>任务领取</h1>
            <p class="muted">按终端领取任务，审阅工作台只显示自己已领取的任务</p>
          </div>
        </div>
        <div class="actions">
          <input id="reviewer" value="local-reviewer" aria-label="reviewer" />
          <a class="button secondary" href="/task-hall">审阅工作台</a>
          <a class="button secondary" href="/project-board">项目看板</a>
          <button id="reload">刷新</button>
        </div>
      </header>
      <main>
        <section class="panel">
          <div class="panel-head">
            <h2 class="panel-title">领取概览</h2>
            <span class="badge" id="claimedCount">0</span>
          </div>
          <div class="panel-body">
            <div class="summary" id="summary"></div>
          </div>
        </section>
        <section class="panel">
          <div class="panel-head">
            <h2 class="panel-title">可领取终端</h2>
            <span class="badge" id="taskCount">0</span>
          </div>
          <div class="panel-body">
            <div class="task-grid" id="tasks"></div>
          </div>
        </section>
      </main>
    </div>
    <div class="toast" id="toast"></div>
    <script>
      if (new URLSearchParams(location.search).get("embedded") === "1") document.body.classList.add("embedded");
      const state = { tasks: [], reviewer: "local-reviewer" };
      const $ = (selector) => document.querySelector(selector);
      const esc = (value) => String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
      const pct = (value) => `${Math.round((Number(value) || 0) * 100)}%`;
      async function api(path, options = {}) {
        const response = await fetch(path, { headers: { "Content-Type": "application/json" }, ...options });
        const payload = await response.json();
        if (!response.ok || payload.error) throw new Error(payload.detail || payload.error?.message || response.statusText);
        return payload.data;
      }
      function toast(message, bad = false) {
        $("#toast").textContent = message;
        $("#toast").style.background = bad ? "#a32920" : "#17212b";
        $("#toast").classList.add("show");
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => $("#toast").classList.remove("show"), 2200);
      }
      function visibleTasks() { return state.tasks.filter((task) => task.has_scan_info); }
      function renderSummary() {
        const claimed = state.tasks.filter((task) => task.claimed_by);
        const mine = claimed.filter((task) => task.claimed_by === state.reviewer);
        const totals = claimed.reduce((acc, task) => {
          acc.renovation += Number(task.renovation_count || task.total_groups || 0);
          acc.uploaded += Number(task.uploaded_count || 0);
          acc.reviewed += Number(task.reviewed_count || 0);
          return acc;
        }, { renovation: 0, uploaded: 0, reviewed: 0 });
        const uploadRate = totals.renovation ? totals.uploaded / totals.renovation : 0;
        const reviewRate = totals.renovation ? totals.reviewed / totals.renovation : 0;
        $("#claimedCount").textContent = `${mine.length}/${claimed.length}`;
        $("#summary").innerHTML = `
          <article class="stat"><span>已领取任务</span><strong>${claimed.length}</strong></article>
          <article class="stat"><span>我的任务</span><strong>${mine.length}</strong></article>
          <article class="stat"><span>已领取改造总数</span><strong>${totals.renovation}</strong></article>
          <article class="stat"><span>已上传 / 审阅</span><strong>${totals.uploaded} / ${totals.reviewed}</strong></article>
          <article class="stat"><span>上传率</span><strong>${pct(uploadRate)}</strong><div class="bar"><i style="--value:${pct(uploadRate)}"></i></div></article>
          <article class="stat"><span>审阅率</span><strong>${pct(reviewRate)}</strong><div class="bar"><i style="--value:${pct(reviewRate)}"></i></div></article>
        `;
      }
      function renderTasks() {
        const tasks = visibleTasks();
        $("#taskCount").textContent = `${tasks.length}/${state.tasks.length}`;
        $("#tasks").innerHTML = tasks.length ? tasks.map((task) => `
          <article class="task">
            <div>
              <div class="name-row"><strong class="name">终端 ${esc(task.terminal || "-")}</strong><span class="badge ${task.claimed_by ? "warn" : "ok"}">${task.claimed_by ? `已领取` : "可领取"}</span></div>
              <div class="muted">${task.claimed_by ? `领取人 ${esc(task.claimed_by)}` : "尚未领取"}</div>
            </div>
            <div class="metric-grid">
              <div class="metric"><span>改造</span><strong>${task.renovation_count || 0}</strong></div>
              <div class="metric"><span>上传</span><strong>${task.uploaded_count || 0}</strong></div>
              <div class="metric"><span>未审</span><strong>${task.unreviewed_count || 0}</strong></div>
              <div class="metric"><span>上传率</span><strong>${pct(task.upload_rate)}</strong></div>
              <div class="metric"><span>审阅率</span><strong>${pct(task.review_rate)}</strong></div>
            </div>
            <div class="bar"><i style="--value:${pct(task.upload_rate)}"></i></div>
            <div class="tool-row">
              <button class="secondary" data-action="release" data-id="${task.id}" ${task.claimed_by === state.reviewer ? "" : "disabled"}>暂存释放</button>
              <button data-action="claim" data-id="${task.id}" ${task.can_claim && (!task.claimed_by || task.claimed_by === state.reviewer) ? "" : "disabled"}>${task.claimed_by === state.reviewer ? "继续持有" : "领取"}</button>
            </div>
          </article>
        `).join("") : `<div class="muted">暂无已导入扫码数据的终端任务</div>`;
        $("#tasks").querySelectorAll("button[data-action]").forEach((button) => button.addEventListener("click", () => handleTask(button.dataset.id, button.dataset.action)));
      }
      async function handleTask(id, action) {
        if (action === "claim") {
          await api(`/local-test/tasks/${id}/claim`, { method: "POST", body: JSON.stringify({ reviewer: state.reviewer }) });
          toast("已领取任务");
        } else {
          await api(`/local-test/tasks/${id}/release`, { method: "POST", body: JSON.stringify({ reviewer: state.reviewer }) });
          toast("已暂存释放");
        }
        await reload();
      }
      async function reload() {
        state.tasks = (await api("/local-test/tasks")).items || [];
        renderSummary();
        renderTasks();
      }
      $("#reviewer").addEventListener("input", (event) => { state.reviewer = event.target.value.trim() || "local-reviewer"; renderSummary(); renderTasks(); });
      $("#reload").addEventListener("click", () => reload().catch((error) => toast(error.message, true)));
      reload().catch((error) => toast(error.message, true));
    </script>
  </body>
</html>
