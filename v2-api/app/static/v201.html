<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=/task-hall" />
    <title>正在进入审阅工作台</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef2f5;
        --surface: #ffffff;
        --ink: #101820;
        --muted: #667280;
        --line: #d8e0e7;
        --accent: #0f6f8f;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, rgba(17,24,32,.055), transparent 220px), var(--bg);
      }
      main {
        width: min(420px, 100%);
        display: grid;
        gap: 12px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        box-shadow: 0 18px 46px rgba(16,31,45,.08);
      }
      h1 { margin: 0; font-size: 20px; line-height: 1.3; }
      p { margin: 0; color: var(--muted); line-height: 1.65; }
      a {
        height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>正在进入正式审阅工作台</h1>
      <p>早期本地联调入口已退役，系统会自动进入正式审阅工作台。</p>
      <a href="/task-hall">进入审阅工作台</a>
    </main>
    <script>
      location.replace("/task-hall");
    </script>
  </body>
</html>
