<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>模块更换项目管理器 V2.0</title>
    <style>
      :root {
        --bg: #eef2f5;
        --top: #101820;
        --top-2: #172331;
        --surface: #ffffff;
        --surface-2: #f7f9fb;
        --ink: #111820;
        --muted: #627084;
        --line: #d5dee7;
        --accent: #0f6f8f;
        --accent-deep: #0a536b;
        --ok: #2b6b57;
        --bad: #a32920;
        --shadow: 0 26px 80px rgba(17, 32, 46, .14);
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 28px;
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(16,24,32,.08), transparent 260px),
          linear-gradient(135deg, rgba(15,111,143,.10), transparent 44%),
          var(--bg);
      }
      h1, h2, p { margin: 0; }
      .shell {
        width: min(1060px, 100%);
        display: grid;
        grid-template-columns: minmax(0, 1.08fr) 420px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255,255,255,.94);
        box-shadow: var(--shadow);
      }
      .brief {
        min-height: 590px;
        display: grid;
        align-content: space-between;
        gap: 36px;
        padding: 38px;
        border-right: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255,255,255,.96), rgba(247,250,251,.96)),
          linear-gradient(135deg, rgba(15,111,143,.10), transparent 48%);
      }
      .mark {
        width: 40px;
        height: 40px;
        display: grid;
        place-items: center;
        border-radius: 10px;
        background: var(--top);
        color: #d9f5ff;
        font-weight: 900;
        letter-spacing: 0;
      }
      h1 {
        max-width: 560px;
        margin-top: 22px;
        font-size: clamp(30px, 4vw, 46px);
        line-height: 1.08;
        letter-spacing: 0;
      }
      .lead {
        max-width: 620px;
        margin-top: 14px;
        color: var(--muted);
        line-height: 1.75;
        font-size: 15px;
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 30px;
      }
      .metric {
        min-height: 94px;
        display: grid;
        align-content: space-between;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
      }
      .metric span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }
      .metric strong {
        margin-top: 8px;
        font-size: 24px;
        letter-spacing: 0;
      }
      .handoff {
        padding-top: 18px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        line-height: 1.7;
        font-size: 13px;
      }
      .readiness {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 18px;
      }
      .ready-item {
        min-height: 46px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(247, 249, 251, .82);
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }
      .ready-item strong {
        display: block;
        margin-bottom: 3px;
        color: var(--ink);
        font-size: 13px;
      }
      .panel {
        display: grid;
        align-content: center;
        padding: 36px;
        background: var(--surface);
      }
      h2 {
        font-size: 24px;
        letter-spacing: 0;
      }
      .panel p {
        margin-top: 8px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
      }
      label {
        display: grid;
        gap: 8px;
        margin-top: 18px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }
      input {
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0 12px;
        color: var(--ink);
        font: inherit;
        background: #fff;
      }
      button {
        width: 100%;
        height: 44px;
        margin-top: 22px;
        border: 1px solid var(--accent);
        border-radius: 10px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(15,111,143,.20);
      }
      button:hover { background: var(--accent-deep); }
      input:focus, button:focus-visible {
        outline: 3px solid rgba(15,111,143,.16);
        outline-offset: 2px;
      }
      .presets {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }
      .preset {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: 100%;
        height: auto;
        margin-top: 0;
        min-height: 42px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface-2);
        color: var(--muted);
        font-size: 12px;
        font: inherit;
        text-align: left;
        box-shadow: none;
        cursor: pointer;
      }
      .preset:hover { border-color: #b4c3d0; background: #fff; }
      .preset:focus-visible { outline: 3px solid rgba(15,111,143,.16); outline-offset: 2px; }
      .preset.disabled { cursor: default; justify-content: flex-start; }
      .preset.disabled:hover { border-color: var(--line); background: var(--surface-2); }
      .preset strong { color: var(--ink); }
      .status {
        min-height: 22px;
        margin-top: 12px;
        color: var(--bad);
        font-size: 12px;
        font-weight: 900;
      }
      .status.ok { color: var(--ok); }
      @media (max-width: 860px) {
        body { padding: 14px; }
        .shell { grid-template-columns: 1fr; }
        .brief {
          min-height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
        .metrics, .readiness { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="brief">
        <div>
          <div class="mark">V2</div>
          <h1>模块更换项目管理器</h1>
          <p class="lead">多人审阅、终端任务领取、资料组归档、异常处理和项目进度看板，面向项目验收与后续部署的第一版 Web 系统。</p>
          <div class="metrics" aria-label="系统能力">
            <div class="metric"><span>协作方式</span><strong>多人审阅</strong></div>
            <div class="metric"><span>资料来源</span><strong>表格导入</strong></div>
            <div class="metric"><span>交付状态</span><strong>验收版</strong></div>
          </div>
          <div class="readiness" aria-label="验收状态">
            <div class="ready-item"><strong>登录鉴权</strong>按角色进入工作台</div>
            <div class="ready-item"><strong>审阅闭环</strong>领取、分类、归档</div>
            <div class="ready-item"><strong>部署准备</strong>生产禁用演示账号</div>
          </div>
        </div>
        <p class="handoff">核心工作流：管理员进入项目看板，导入表格并查看进度；审阅员领取终端任务，使用快捷键完成图片分类；管理员处理异常和补图，为服务器部署做准备。</p>
      </section>
      <section class="panel">
        <h2>登录系统</h2>
        <p>选择管理端或审阅端账号进入对应工作台。</p>
        <label>账号<input id="username" autocomplete="username" placeholder="请输入账号" /></label>
        <label>团队标识<input id="teamId" autocomplete="organization" placeholder="例如 team-a" /></label>
        <label>密码<input id="password" type="password" autocomplete="current-password" placeholder="请输入密码" /></label>
        <button id="login">进入系统</button>
        <div class="status" id="error" role="status" aria-live="polite"></div>
        <div class="presets" id="presets" aria-label="演示账号"></div>
      </section>
    </main>
    <script>
      const usernameInput = document.querySelector("#username");
      const teamInput = document.querySelector("#teamId");
      const passwordInput = document.querySelector("#password");
      const presets = document.querySelector("#presets");
      const esc = (value) => String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
      function fillAccount(account) {
        usernameInput.value = account.username || "";
        teamInput.value = account.team_id || localStorage.getItem("module_manager_team_id") || "demo-team";
        passwordInput.value = account.password || "";
        usernameInput.focus();
      }
      function renderLoginConfig(config) {
        const accounts = config?.demo_auth_enabled ? (config.demo_accounts || []) : [];
        if (!accounts.length) {
          presets.innerHTML = `<div class="preset disabled"><strong>正式登录</strong><span>请输入管理员分配的账号</span></div>`;
          return;
        }
        presets.innerHTML = accounts.map((account, index) => `
          <div class="preset" role="button" tabindex="0" data-index="${index}">
            <strong>${esc(account.label || account.role || "演示账号")}</strong>
            <span>${esc(account.username)} / 本地演示</span>
          </div>
        `).join("");
        presets.querySelectorAll("[data-index]").forEach((item) => {
          const account = accounts[Number(item.dataset.index)];
          item.addEventListener("click", () => fillAccount(account));
          item.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              fillAccount(account);
            }
          });
        });
        if (!usernameInput.value && accounts[0]) fillAccount(accounts[0]);
      }
      async function loadLoginConfig() {
        try {
          const response = await fetch("/auth/config");
          const payload = await response.json();
          if (response.ok && !payload.error) {
            renderLoginConfig(payload.data);
            return;
          }
        } catch (error) {
          // Keep production login quiet if the config endpoint is temporarily unavailable.
        }
        renderLoginConfig({ demo_auth_enabled: false, demo_accounts: [] });
      }
      async function login() {
        const error = document.querySelector("#error");
        error.classList.remove("ok");
        error.textContent = "";
        const response = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: usernameInput.value.trim(),
            team_id: teamInput.value.trim() || "default-team",
            password: passwordInput.value,
          }),
        });
        const payload = await response.json();
        if (!response.ok || payload.error) {
          error.textContent = "账号或密码不正确";
          return;
        }
        error.classList.add("ok");
        error.textContent = "登录成功，正在进入工作台";
        localStorage.setItem("module_manager_team_id", payload.data.team_id || payload.data.user?.team_id || teamInput.value.trim() || "default-team");
        localStorage.setItem("module_manager_session", JSON.stringify(payload.data));
        location.href = payload.data.user?.home || "/project-board";
      }
      document.querySelector("#login").addEventListener("click", login);
      document.querySelector("#password").addEventListener("keydown", (event) => {
        if (event.key === "Enter") login();
      });
      loadLoginConfig();
    </script>
  </body>
</html>
