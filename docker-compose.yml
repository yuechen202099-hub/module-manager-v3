services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-module_manager_v2}
      POSTGRES_USER: ${POSTGRES_USER:-module_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-module_manager_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-module_manager} -d ${POSTGRES_DB:-module_manager_v2}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./v2-api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./v2-web
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:

